function initDashboardCharts() {
  if (typeof Chart === 'undefined') return;
  // Destroy old charts if present
  Object.values(state.charts || {}).forEach(c => { try { c.destroy(); } catch (e) {} });
  state.charts = {};

  const commonOpts = {
    responsive: true,
    maintainAspectRatio: false,
    plugins: { legend: { labels: { font: { size: 11 } } } }
  };

  // 1. Collections over last 30 days
  const colEl = document.getElementById('chart-collections');
  if (colEl) {
    const days = [];
    const labels = [];
    for (let i = 29; i >= 0; i--) {
      const d = new Date();
      d.setDate(d.getDate() - i);
      const dStr = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
      const total = state.payments.filter(p => p.paymentDate === dStr).reduce((s,p) => s+p.amount, 0);
      days.push(total);
      labels.push(d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short' }));
    }
    state.charts.collections = new Chart(colEl, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'Daily Collections (N$)',
          data: days,
          borderColor: '#1e40af',
          backgroundColor: 'rgba(30, 64, 175, 0.1)',
          fill: true,
          tension: 0.3,
          pointRadius: 2
        }]
      },
      options: { ...commonOpts, scales: { y: { beginAtZero: true, ticks: { callback: v => 'N$' + v.toLocaleString() } } } }
    });
  }

  // 2. Loan status distribution (donut)
  const statusEl = document.getElementById('chart-status');
  if (statusEl) {
    const counts = { Active: 0, Pending: 0, Completed: 0, Defaulted: 0, 'Written Off': 0, Overdue: 0 };
    state.loans.forEach(l => {
      if (l.status === 'Active' && isOverdue(l)) counts.Overdue++;
      else counts[l.status] = (counts[l.status] || 0) + 1;
    });
    const filtered = Object.entries(counts).filter(([k,v]) => v > 0);
    state.charts.status = new Chart(statusEl, {
      type: 'doughnut',
      data: {
        labels: filtered.map(([k]) => k),
        datasets: [{
          data: filtered.map(([k,v]) => v),
          backgroundColor: ['#1e40af','#f59e0b','#16a34a','#dc2626','#64748b','#991b1b'],
          borderWidth: 2,
          borderColor: '#fff'
        }]
      },
      options: { ...commonOpts, cutout: '60%' }
    });
  }

  // 3. Portfolio growth (cumulative outstanding by month, last 6 months)
  const portEl = document.getElementById('chart-portfolio');
  if (portEl) {
    const months = [];
    const data = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date();
      d.setMonth(d.getMonth() - i);
      d.setDate(1);
      const endOfMonth = new Date(d.getFullYear(), d.getMonth() + 1, 0);
      const endStr = endOfMonth.toISOString().split('T')[0];
      // Calculate outstanding as of end of this month
      let outstanding = 0;
      state.loans.forEach(l => {
        if (l.disbursementDate > endStr) return;
        const repaid = state.payments.filter(p => p.loanId === l.id && p.paymentDate <= endStr).reduce((s,p) => s+p.amount, 0);
        const remaining = l.totalRepayable - repaid;
        if (remaining > 0.01) outstanding += remaining;
      });
      data.push(outstanding);
      months.push(d.toLocaleDateString('en-GB', { month: 'short', year: '2-digit' }));
    }
    state.charts.portfolio = new Chart(portEl, {
      type: 'bar',
      data: { labels: months, datasets: [{ label: 'Outstanding Portfolio (N$)', data, backgroundColor: '#1e40af' }] },
      options: { ...commonOpts, scales: { y: { beginAtZero: true, ticks: { callback: v => 'N$' + (v/1000).toFixed(0) + 'k' } } } }
    });
  }

  // 4. Disbursements vs Collections (6 months)
  const flowEl = document.getElementById('chart-flow');
  if (flowEl) {
    const labels = [];
    const disb = [];
    const coll = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date();
      d.setMonth(d.getMonth() - i);
      const yyyymm = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0');
      labels.push(d.toLocaleDateString('en-GB', { month: 'short', year: '2-digit' }));
      disb.push(state.loans.filter(l => l.disbursementDate.startsWith(yyyymm)).reduce((s,l) => s+l.principal, 0));
      coll.push(state.payments.filter(p => p.paymentDate.startsWith(yyyymm)).reduce((s,p) => s+p.amount, 0));
    }
    state.charts.flow = new Chart(flowEl, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          { label: 'Disbursed (N$)', data: disb, backgroundColor: '#1e40af' },
          { label: 'Collected (N$)', data: coll, backgroundColor: '#16a34a' }
        ]
      },
      options: { ...commonOpts, scales: { y: { beginAtZero: true, ticks: { callback: v => 'N$' + (v/1000).toFixed(0) + 'k' } } } }
    });
  }
}

function bulkChangeLoanStatus(newStatus) {
  const ids = Array.from(state.bulkSelection.loans);
  if (ids.length === 0) return;
  confirmAction(`Change status to "${newStatus}" for ${ids.length} loan(s)?`, async () => {
    for (const id of ids) {
      const idx = state.loans.findIndex(l => l.id === id);
      if (idx === -1) continue;
      const before = { ...state.loans[idx] };
      state.loans[idx].status = newStatus;
      state.loans[idx].updatedAt = new Date().toISOString();
      await logAudit('update', 'loan', id, { changes: { status: { before: before.status, after: newStatus } }, bulk: true });
    }
    await saveTable('loans');
    state.bulkSelection.loans.clear();
    closeModal();
    render();
    showAlert(`${ids.length} loan(s) updated to ${newStatus}.`, 'Done');
  }, 'Apply', 'bg-blue-700 hover:bg-blue-800');
}

function bulkSendStatements() {
  const ids = Array.from(state.bulkSelection.loans);
  // Group by client
  const clientIds = [...new Set(ids.map(id => state.loans.find(l => l.id === id)?.clientId).filter(Boolean))];
  if (clientIds.length === 0) return;
  confirmAction(`Open WhatsApp for ${clientIds.length} client(s)?\n\nA new WhatsApp tab will open for each client (with a statement summary). Your browser may ask permission to open multiple tabs.`, async () => {
    closeModal();
    for (let i = 0; i < clientIds.length; i++) {
      const c = state.clients.find(c => c.id === clientIds[i]);
      if (!c) continue;
      const clientLoans = state.loans.filter(l => l.clientId === c.id);
      const totalOut = clientLoans.filter(l => l.status === 'Active').reduce((s,l) => s + loanOutstanding(l.id), 0);
      const msg = `Hello ${c.fullName.split(' ')[0]},\n\nAccount summary from ${state.settings.companyName || 'Instant Cashloan'}:\n\nActive loans: ${clientLoans.filter(l => l.status === 'Active').length}\nTotal outstanding: ${fmt(totalOut)}\n\nPlease contact us if you have any queries.\n\nThank you.`;
      setTimeout(() => openWhatsApp(c.phone, msg), i * 600); // stagger to avoid popup blocker
    }
    state.bulkSelection.loans.clear();
    render();
  }, 'Open WhatsApp', 'bg-green-700 hover:bg-green-800');
}

// =====================================================
function renderReminders() {
  const today_ = today();
  const upcoming = []; // due within next 3 days, not yet due
  const overdue = []; // already overdue

  state.loans.forEach(l => {
    if (l.status === 'Completed' || l.status === 'Written Off') return;
    const c = state.clients.find(c => c.id === l.clientId);
    if (!c) return;
    ensureSchedule(l).forEach(s => {
      if (s.status === 'Paid' || (s.amountDue - s.amountPaid) <= 0.01) return;
      const balance = s.amountDue - s.amountPaid;
      const days = daysBetween(s.dueDate, today_);
      if (days >= 0 && days <= 30) {
        overdue.push({ loan: l, client: c, inst: s, daysOverdue: days, balance });
      } else if (days < 0 && days >= -3) {
        upcoming.push({ loan: l, client: c, inst: s, daysUntil: -days, balance });
      }
    });
  });

  overdue.sort((a,b) => b.daysOverdue - a.daysOverdue);
  upcoming.sort((a,b) => a.daysUntil - b.daysUntil);

  const buildReminderMsg = (item, isOverdueMsg) => {
    const co = state.settings.companyName || 'Instant Cashloan';
    if (isOverdueMsg) {
      return `Hello ${item.client.fullName.split(' ')[0]},\n\nThis is a reminder from ${co} that your loan instalment is now ${item.daysOverdue} day(s) overdue.\n\nLoan: ${item.loan.id}\nInstalment ${item.inst.instalmentNo} of ${item.loan.termMonths}\nAmount Due: ${fmt(item.balance)}\nOriginal Due Date: ${fmtDate(item.inst.dueDate)}\n\nPlease make payment as soon as possible to avoid further charges and adverse credit listing. Reply to this message to arrange payment.\n\nThank you.`;
    }
    return `Hello ${item.client.fullName.split(' ')[0]},\n\nFriendly reminder from ${co} that your next loan instalment is due in ${item.daysUntil} day(s).\n\nLoan: ${item.loan.id}\nInstalment ${item.inst.instalmentNo} of ${item.loan.termMonths}\nAmount Due: ${fmt(item.balance)}\nDue Date: ${fmtDate(item.inst.dueDate)}\n\nThank you for your continued business.`;
  };

  const totalOverdueAmount = overdue.reduce((s,x) => s+x.balance, 0);
  const totalUpcomingAmount = upcoming.reduce((s,x) => s+x.balance, 0);

  return `
    <div class="mb-6">
      <h1 class="text-2xl font-bold text-slate-900">Reminders</h1>
      <p class="text-slate-500 text-sm mt-1">Send WhatsApp reminders for upcoming and overdue payments</p>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-6">
      <div class="card p-5 border-l-4" style="border-left-color:#dc2626">
        <div class="text-xs font-medium text-red-700 uppercase">Overdue Reminders</div>
        <div class="text-3xl font-bold text-red-700 mt-2">${overdue.length}</div>
        <div class="text-sm text-slate-600 mt-1">${fmt(totalOverdueAmount)} in arrears</div>
      </div>
      <div class="card p-5 border-l-4" style="border-left-color:#f59e0b">
        <div class="text-xs font-medium text-amber-700 uppercase">Due in Next 3 Days</div>
        <div class="text-3xl font-bold text-amber-700 mt-2">${upcoming.length}</div>
        <div class="text-sm text-slate-600 mt-1">${fmt(totalUpcomingAmount)} expected</div>
      </div>
    </div>

    <div class="card overflow-hidden mb-6">
      <div class="px-6 py-3 border-b border-slate-200 bg-red-50">
        <h3 class="font-semibold text-red-900">Overdue Payments</h3>
        <p class="text-xs text-red-800 mt-1">Click WhatsApp to send overdue notice to each client</p>
      </div>
      ${overdue.length === 0 ? '<div class="p-12 text-center text-slate-500">No overdue payments. 🎉</div>' : `
        <table>
          <thead><tr><th>Client</th><th>Phone</th><th>Loan</th><th>Days Overdue</th><th>Amount Due</th><th class="text-right">Action</th></tr></thead>
          <tbody>
            ${overdue.map((item, i) => `<tr>
              <td class="font-medium">${escapeHtml(item.client.fullName)}</td>
              <td>${escapeHtml(item.client.phone)}</td>
              <td class="font-mono text-xs">${item.loan.id}</td>
              <td><span class="badge badge-overdue">${item.daysOverdue}d</span></td>
              <td class="font-medium">${fmt(item.balance)}</td>
              <td class="text-right"><button onclick='sendReminderWhatsApp(${JSON.stringify(item.client.phone)}, ${JSON.stringify(buildReminderMsg(item, true))})' class="text-sm bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded font-medium">WhatsApp</button></td>
            </tr>`).join('')}
          </tbody>
        </table>`}
    </div>

    <div class="card overflow-hidden">
      <div class="px-6 py-3 border-b border-slate-200 bg-amber-50">
        <h3 class="font-semibold text-amber-900">Upcoming Payments</h3>
        <p class="text-xs text-amber-800 mt-1">Send friendly reminders to clients with payments due soon</p>
      </div>
      ${upcoming.length === 0 ? '<div class="p-12 text-center text-slate-500">No payments due in the next 3 days.</div>' : `
        <table>
          <thead><tr><th>Client</th><th>Phone</th><th>Loan</th><th>Due In</th><th>Amount</th><th class="text-right">Action</th></tr></thead>
          <tbody>
            ${upcoming.map(item => `<tr>
              <td class="font-medium">${escapeHtml(item.client.fullName)}</td>
              <td>${escapeHtml(item.client.phone)}</td>
              <td class="font-mono text-xs">${item.loan.id}</td>
              <td>${item.daysUntil} day(s)</td>
              <td class="font-medium">${fmt(item.balance)}</td>
              <td class="text-right"><button onclick='sendReminderWhatsApp(${JSON.stringify(item.client.phone)}, ${JSON.stringify(buildReminderMsg(item, false))})' class="text-sm bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded font-medium">WhatsApp</button></td>
            </tr>`).join('')}
          </tbody>
        </table>`}
    </div>
  `;
}

function csvEscape(v) {
  const s = String(v ?? '');
  return /[",\n\r]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
}

function tableToCSV(rows, columns) {
  const header = columns.map(c => csvEscape(c.label)).join(',');
  const data = rows.map(row => columns.map(c => csvEscape(typeof c.value === 'function' ? c.value(row) : row[c.value])).join(','));
  return [header, ...data].join('\r\n');
}

async function exportFullBackup() {
  showAlert('Preparing backup... This may take a few seconds if you have many KYC documents.', 'Working');
  // Collect KYC documents
  const kycDocs = {};
  for (const c of state.clients) {
    for (const type of ['photo', 'id', 'income']) {
      const d = await loadKycDocument(c.id, type);
      if (d) kycDocs[`${c.id}:${type}`] = d;
    }
  }
  closeConfirm();
  const backup = {
    appName: 'Instant Cashloan',
    version: 1,
    exportDate: new Date().toISOString(),
    exportedBy: state.currentUser?.fullName || 'Unknown',
    clients: state.clients,
    loans: state.loans,
    payments: state.payments,
    audit: state.audit,
    settings: state.settings,
    users: state.users.map(u => ({ ...u, passwordHash: '[redacted]' })),
    kycDocuments: kycDocs
  };
  const json = JSON.stringify(backup, null, 2);
  showDataExport(`Backup_${today()}.json`, json, 'application/json');
  await logAudit('export', 'backup', '', { sizeBytes: json.length, clientCount: state.clients.length });
}

function showDataExport(filename, content, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const blobUrl = URL.createObjectURL(blob);
  state.currentExport = { filename, content, mimeType, blobUrl };
  const sizeKB = Math.round(content.length / 1024);
  const html = `
    <div class="fixed inset-0 modal-backdrop flex items-center justify-center z-[70] p-4">
      <div class="bg-white rounded-xl shadow-xl w-full max-w-3xl h-[85vh] flex flex-col">
        <div class="px-6 py-3 border-b border-slate-200 flex justify-between items-center flex-shrink-0">
          <div>
            <div class="font-semibold text-slate-900">${escapeHtml(filename)}</div>
            <div class="text-xs text-slate-500 mt-0.5">${sizeKB}KB · ${mimeType}</div>
          </div>
          <div class="flex gap-2">
            <button onclick="copyExportToClipboard()" class="btn-secondary text-sm">Copy to Clipboard</button>
            <button onclick="downloadCurrentExport()" class="btn-primary text-sm">Download File</button>
            <button onclick="closeExportPreview()" class="btn-secondary text-sm">Close</button>
          </div>
        </div>
        <div class="px-6 py-2 bg-amber-50 border-b border-amber-200 text-xs text-amber-900 flex-shrink-0">
          💾 <strong>Important:</strong> Download or copy this file and save it somewhere safe. Browser storage can be cleared at any time.
        </div>
        <textarea readonly class="flex-1 w-full p-4 font-mono text-xs border-0 resize-none" style="border-radius:0; outline:none;">${escapeHtml(content.length > 500000 ? content.substring(0, 500000) + '\n\n... [content truncated for display — use Download to get full file]' : content)}</textarea>
      </div>
    </div>
  `;
  const div = document.createElement('div');
  div.id = 'export-preview-container';
  div.innerHTML = html;
  document.body.appendChild(div);
}

function closeExportPreview() {
  const c = document.getElementById('export-preview-container');
  if (c) c.remove();
  if (state.currentExport?.blobUrl) {
    try { URL.revokeObjectURL(state.currentExport.blobUrl); } catch (e) {}
  }
  state.currentExport = null;
}

function downloadCurrentExport() {
  if (!state.currentExport) return;
  const { blobUrl, filename } = state.currentExport;
  try {
    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = filename;
    a.target = '_blank';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  } catch (e) {
    if (typeof openLink === 'function') openLink(blobUrl);
    else window.open(blobUrl, '_blank');
  }
}

async function copyExportToClipboard() {
  if (!state.currentExport) return;
  try {
    await navigator.clipboard.writeText(state.currentExport.content);
    showAlert('Copied to clipboard. Paste into a file editor and save.', 'Copied');
  } catch (e) {
    showAlert('Could not auto-copy. Select all text in the box and copy manually (Ctrl+A then Ctrl+C).');
  }
}

function triggerImportBackup() {

async function handleBackupImport(input) {
  const file = input.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const backup = JSON.parse(text);
    if (!backup.clients || !Array.isArray(backup.clients)) throw new Error('Not a valid backup file (missing clients array)');
    confirmAction(
      `Restore backup from ${backup.exportDate ? fmtDateTime(backup.exportDate) : 'unknown date'}?\n\n` +
      `This will REPLACE all current data with:\n` +
      `• ${backup.clients?.length || 0} clients\n` +
      `• ${backup.loans?.length || 0} loans\n` +
      `• ${backup.payments?.length || 0} payments\n` +
      `• ${Object.keys(backup.kycDocuments || {}).length} KYC documents\n\n` +
      `Your current data will be lost. This cannot be undone.`,
      async () => {
        state.clients = backup.clients || [];
        state.loans = backup.loans || [];
        state.payments = backup.payments || [];
        state.audit = backup.audit || [];
        state.settings = backup.settings || {};
        // Do not restore users (would lock you out if hashes differ)
        for (const k of ['clients', 'loans', 'payments', 'audit']) await saveTable(k);
        await saveSettings();
        // Restore KYC
        if (backup.kycDocuments) {
          for (const key in backup.kycDocuments) {
            try { await window.storage.set(`kyc:${key}`, JSON.stringify(backup.kycDocuments[key])); } catch (e) {}
          }
        }
        await logAudit('import', 'backup', '', { source: file.name, clients: state.clients.length });
        reallocateAllSchedules();
        showAlert('Backup restored successfully.', 'Done');
        render();
      },
      'Restore', 'bg-red-600 hover:bg-red-700'
    );
  } catch (e) {
    showAlert('Could not parse backup file: ' + e.message, 'Import Error');
  }
  input.value = '';
}

// CSV IMPORT FOR CLIENTS
async function handleClientsCsvImport(input) {
  const file = input.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const rows = parseCSV(text);
    if (rows.length < 2) throw new Error('CSV file appears empty');
    const headers = rows[0].map(h => h.trim().toLowerCase());
    const findCol = (...names) => {
      for (const n of names) { const i = headers.indexOf(n.toLowerCase()); if (i >= 0) return i; }
      return -1;
    };
    const nameCol = findCol('full name', 'fullname', 'name');
    const idCol = findCol('id number', 'idnumber', 'id');
    const phoneCol = findCol('phone', 'phone number', 'mobile');
    if (nameCol < 0 || idCol < 0 || phoneCol < 0) {
      throw new Error('CSV must contain columns: "Full Name", "ID Number", and "Phone" (case insensitive). Missing one or more.');
    }
    const dataRows = rows.slice(1).filter(r => r[nameCol] || r[idCol] || r[phoneCol]);
    showCsvImportPreview(dataRows, headers, { nameCol, idCol, phoneCol,
      altPhoneCol: findCol('alt phone', 'alternative phone'),
      emailCol: findCol('email'),
      addressCol: findCol('address'),
      employerCol: findCol('employer', 'employer / business'),
      incomeCol: findCol('monthly income', 'income'),
      emergencyCol: findCol('emergency contact', 'emergency')
    });
  } catch (e) {
    showAlert('Could not import CSV: ' + e.message);
  }
  input.value = '';
}

function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = '';
  let inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (inQuotes) {
      if (ch === '"' && text[i+1] === '"') { cell += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { cell += ch; }
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ',') { row.push(cell); cell = ''; }
      else if (ch === '\r') { /* skip */ }
      else if (ch === '\n') { row.push(cell); rows.push(row); row = []; cell = ''; }
      else { cell += ch; }
    }
  }
  if (cell || row.length) { row.push(cell); rows.push(row); }
  return rows;
}

function showCsvImportPreview(dataRows, headers, cols) {
  const preview = dataRows.slice(0, 10);
  const modal = `
    <div class="fixed inset-0 modal-backdrop flex items-center justify-center z-50 p-4" onclick="if(event.target===this) closeModal()">
      <div class="bg-white rounded-xl shadow-xl w-full max-w-4xl max-h-[85vh] overflow-auto">
        <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center sticky top-0 bg-white">
          <div><h2 class="font-semibold text-lg">CSV Import Preview</h2><div class="text-sm text-slate-500 mt-1">${dataRows.length} client record(s) found · showing first ${preview.length}</div></div>
          <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600">✕</button>
        </div>
        <div class="p-6">
          <table>
            <thead><tr><th>Full Name</th><th>ID Number</th><th>Phone</th><th>Email</th></tr></thead>
            <tbody>
              ${preview.map(r => `<tr><td>${escapeHtml(r[cols.nameCol] || '')}</td><td>${escapeHtml(r[cols.idCol] || '')}</td><td>${escapeHtml(r[cols.phoneCol] || '')}</td><td>${escapeHtml(cols.emailCol >= 0 ? r[cols.emailCol] : '')}</td></tr>`).join('')}
            </tbody>
          </table>
          <div class="bg-amber-50 border border-amber-200 rounded-lg p-3 mt-4 text-sm text-amber-900">
            <strong>Note:</strong> Duplicates (by ID Number) will be skipped. Existing clients are not modified.
          </div>
        </div>
        <div class="px-6 py-4 border-t border-slate-200 flex justify-end gap-2 sticky bottom-0 bg-white">
          <button onclick="closeModal()" class="btn-secondary">Cancel</button>
          <button onclick='commitCsvImport(${JSON.stringify(dataRows).replace(/'/g, "\\'")}, ${JSON.stringify(cols)})' class="btn-primary">Import ${dataRows.length} Client(s)</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal-container').innerHTML = modal;
}

async function commitCsvImport(dataRows, cols) {
  const existingIds = new Set(state.clients.map(c => (c.idNumber || '').trim().toLowerCase()));
  let imported = 0, skipped = 0;
  for (const r of dataRows) {
    const idNum = (r[cols.idCol] || '').trim();
    if (!idNum || existingIds.has(idNum.toLowerCase())) { skipped++; continue; }
    const fullName = (r[cols.nameCol] || '').trim();
    const phone = (r[cols.phoneCol] || '').trim();
    if (!fullName || !phone) { skipped++; continue; }
    state.clients.push({
      id: genId('CL'),
      fullName, idNumber: idNum, phone,
      altPhone: cols.altPhoneCol >= 0 ? (r[cols.altPhoneCol] || '').trim() : '',
      email: cols.emailCol >= 0 ? (r[cols.emailCol] || '').trim() : '',
      address: cols.addressCol >= 0 ? (r[cols.addressCol] || '').trim() : '',
      employer: cols.employerCol >= 0 ? (r[cols.employerCol] || '').trim() : '',
      monthlyIncome: cols.incomeCol >= 0 ? (parseFloat(r[cols.incomeCol]) || 0) : 0,
      emergencyContact: cols.emergencyCol >= 0 ? (r[cols.emergencyCol] || '').trim() : '',
      status: 'Active',
      registrationDate: today(),
      createdBy: state.currentUser?.id,
      importedFromCsv: true
    });
    existingIds.add(idNum.toLowerCase());
    imported++;
  }
  await saveTable('clients');
  await logAudit('import', 'client', '', { imported, skipped });
  closeModal();
  showAlert(`Import complete.\n\n${imported} client(s) added\n${skipped} skipped (duplicates or missing fields)`, 'CSV Import');
  render();
}

async function saveProduct(editId) {
  const name = document.getElementById('pr-name').value.trim();
  if (!name) { showAlert('Product name is required.'); return; }
  const record = {
    name,
    description: document.getElementById('pr-description').value.trim() || null,
    min_principal: parseFloat(document.getElementById('pr-min').value) || 0,
    max_principal: parseFloat(document.getElementById('pr-max').value) || 0,
    interest_rate: parseFloat(document.getElementById('pr-rate').value) || 0,
    term_months: parseInt(document.getElementById('pr-term').value) || 1,
    fee: parseFloat(document.getElementById('pr-fee').value) || 0,
    eligibility: document.getElementById('pr-eligibility').value.trim() || null
  };
  if (record.min_principal > record.max_principal) { showAlert('Minimum principal cannot be greater than maximum.'); return; }
  if (editId) {
    const activeEl = document.getElementById('pr-active');
    if (activeEl) record.active = activeEl.value === 'true';
    const { error } = await db.from('products').update(record).eq('id', editId);
    if (error) { showAlert('Save failed: ' + error.message); return; }
    await logAudit('update', 'product', editId, { changes: record });
  } else {
    record.active = true;
    record.created_by = state.currentUser?.id || null;
    const { data, error } = await db.from('products').insert(record).select().single();
    if (error) { showAlert('Save failed: ' + error.message); return; }
    await logAudit('create', 'product', data.id, { name });
  }
  await saveTable('products');
  closeModal();
  render();
}

async function deleteProduct(productId) {
  const product = state.products.find(p => p.id === productId);
  if (!product) return;
  const usageCount = state.loans.filter(l => l.productId === productId).length;
  let msg = `Delete product "${product.name}"?`;
  if (usageCount > 0) msg += `\n\n${usageCount} existing loan(s) reference this product. They will keep their current terms but lose the product link.`;
  msg += '\n\nThis cannot be undone.';
  confirmAction(msg, async () => {
    const { error } = await db.from('products').delete().eq('id', productId);
    if (error) { showAlert('Delete failed: ' + error.message); return; }
    await logAudit('delete', 'product', productId, { snapshot: product });
    await saveTable('products');
    render();
  });
}

function applyProductToLoanForm(productId) {
  const product = state.products.find(p => p.id === productId);
  if (!product) return;
  const rateEl = document.getElementById('f-rate');
  const termEl = document.getElementById('f-term');
  const principalEl = document.getElementById('f-principal');
  if (rateEl) rateEl.value = product.interestRate;
  if (termEl) termEl.value = product.termMonths;
  if (principalEl && !principalEl.value) principalEl.value = product.minPrincipal;
  // Show product range hint
  const hint = document.getElementById('product-hint');
  if (hint) hint.textContent = `Range: ${fmt(product.minPrincipal)} – ${fmt(product.maxPrincipal)}${product.fee ? ` · Fee: ${fmt(product.fee)}` : ''}`;
  updateLoanCalc();
}

// =====================================================
// LATE PAYMENT PENALTIES
// =====================================================
function calculatePenalties(loan) {
  if (!loan || !state.settings.penalty?.enabled) return [];
  const cfg = state.settings.penalty;
  const today_ = today();
  const schedule = ensureSchedule(loan);
  const penalties = [];
  for (const inst of schedule) {
    const balance = inst.amountDue - inst.amountPaid;
    if (balance <= 0.01) continue;
    const daysLate = daysBetween(inst.dueDate, today_);
    const effectiveDays = daysLate - (cfg.gracePeriodDays || 0);
    if (effectiveDays <= 0) continue;
    let amount = 0;
    const base = cfg.basis === 'instalment' ? inst.amountDue : (loan.totalRepayable - loanPaid(loan.id));
    if (cfg.type === 'percentage') {
      const baseAmount = base * ((cfg.amount || 0) / 100);
      if (cfg.frequency === 'monthly') amount = baseAmount * Math.ceil(effectiveDays / 30);
      else if (cfg.frequency === 'daily') amount = baseAmount * effectiveDays;
      else amount = baseAmount;
    } else {
      if (cfg.frequency === 'monthly') amount = (cfg.amount || 0) * Math.ceil(effectiveDays / 30);
      else if (cfg.frequency === 'daily') amount = (cfg.amount || 0) * effectiveDays;
      else amount = cfg.amount || 0;
    }
    penalties.push({ instalmentNo: inst.instalmentNo, dueDate: inst.dueDate, daysLate, effectiveDays, amount: Math.round(amount * 100) / 100 });
  }
  // Apply cap as % of principal
  const cap = loan.principal * ((cfg.maxPenaltyPercent || 100) / 100);
  let total = penalties.reduce((s, p) => s + p.amount, 0);
  if (total > cap && total > 0) {
    const ratio = cap / total;
    penalties.forEach(p => { p.amount = Math.round(p.amount * ratio * 100) / 100; });
  }
  return penalties;
}

function totalPenalties(loanId) {
  const loan = state.loans.find(l => l.id === loanId);
  if (!loan) return 0;
  return calculatePenalties(loan).reduce((s, p) => s + p.amount, 0);
}

function openEmail(toEmail, subject, body) {
  // mailto: link with pre-composed message
  let url = 'mailto:';
  if (toEmail) url += encodeURIComponent(toEmail);
  const params = [];
  if (subject) params.push('subject=' + encodeURIComponent(subject));
  if (body) params.push('body=' + encodeURIComponent(body));
  if (params.length) url += '?' + params.join('&');
  if (typeof openLink === 'function') openLink(url);
  else window.open(url, '_blank');
}

function sendCurrentPdfEmail() {
  if (!state.currentPdf?.email) return;
  // Download PDF first so user can attach
  downloadCurrentPdf();
  const { to, subject, body } = state.currentPdf.email;
  setTimeout(() => openEmail(to, subject, body), 400);
}
