// =====================================================
// CASE CONVERSION (Postgres snake_case ↔ JS camelCase)
// =====================================================
function snakeToCamel(obj) {
  if (obj === null || obj === undefined) return obj;
  if (Array.isArray(obj)) return obj.map(snakeToCamel);
  if (typeof obj !== 'object') return obj;
  const result = {};
  for (const key in obj) {
    const camel = key.replace(/_([a-z])/g, (_, c) => c.toUpperCase());
    result[camel] = obj[key];
  }
  return result;
}

async function hashPassword(pw) {
  const buf = new TextEncoder().encode(pw);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

function diffObjects(before, after, ignoreFields = ['updatedAt', 'createdAt']) {
  const changes = {};
  const allKeys = new Set([...Object.keys(before || {}), ...Object.keys(after || {})]);
  for (const k of allKeys) {
    if (ignoreFields.includes(k)) continue;
    if (typeof before[k] === 'object' || typeof after[k] === 'object') continue;
    if (before[k] !== after[k]) changes[k] = { before: before[k], after: after[k] };
  }
  return changes;
}

// =====================================================
// PAYMENT SCHEDULE
// =====================================================
function generateSchedule(loan) {
  const schedule = [];
  const baseDate = new Date(loan.disbursementDate);
  let remaining = loan.totalRepayable;
  for (let i = 1; i <= loan.termMonths; i++) {
    const dueDate = new Date(baseDate);
    dueDate.setMonth(dueDate.getMonth() + i);
    const amount = (i === loan.termMonths) ? remaining : loan.monthlyInstallment;
    remaining -= amount;
    schedule.push({
      instalmentNo: i,
      dueDate: dueDate.toISOString().split('T')[0],
      amountDue: Math.round(amount * 100) / 100,
      amountPaid: 0,
      status: 'Pending'
    });
  }
  return schedule;
}

function ensureSchedule(loan) {
  if (!loan.schedule || loan.schedule.length === 0) {
    loan.schedule = generateSchedule(loan);
  }
  return loan.schedule;
}

function allocatePayments(loanId) {
  const loan = state.loans.find(l => l.id === loanId);
  if (!loan) return;
  const schedule = ensureSchedule(loan);
  // Reset
  schedule.forEach(s => { s.amountPaid = 0; s.status = 'Pending'; });
  // Get payments sorted by date
  const payments = state.payments
    .filter(p => p.loanId === loanId)
    .sort((a, b) => a.paymentDate.localeCompare(b.paymentDate));
  let pool = payments.reduce((s, p) => s + p.amount, 0);
  // FIFO allocation: oldest unpaid instalment first
  for (const inst of schedule) {
    if (pool <= 0.01) break;
    const alloc = Math.min(pool, inst.amountDue);
    inst.amountPaid = Math.round(alloc * 100) / 100;
    pool -= alloc;
  }
  // Status
  const today_ = today();
  schedule.forEach(s => {
    if (s.amountPaid >= s.amountDue - 0.01) s.status = 'Paid';
    else if (s.amountPaid > 0 && s.dueDate < today_) s.status = 'Partial';
    else if (s.amountPaid > 0) s.status = 'Partial';
    else if (s.dueDate < today_) s.status = 'Overdue';
    else s.status = 'Pending';
  });
}

function reallocateAllSchedules() {
  state.loans.forEach(l => allocatePayments(l.id));
}

// =====================================================
// CALCULATIONS
// =====================================================
function calcLoan(principal, rate, term) {
  const totalRepayable = principal + (principal * rate / 100);
  const monthlyInstallment = Math.round((totalRepayable / term) * 100) / 100;
  return { totalRepayable, monthlyInstallment };
}

function loanPaid(loanId) {
  return state.payments.filter(p => p.loanId === loanId).reduce((s, p) => s + p.amount, 0);
}

function loanOutstanding(loanId) {
  const loan = state.loans.find(l => l.id === loanId);
  if (!loan) return 0;
  const penalties = totalPenalties(loanId);
  return Math.round((loan.totalRepayable + penalties - loanPaid(loanId)) * 100) / 100;
}

function loanOutstandingExclPenalty(loanId) {
  const loan = state.loans.find(l => l.id === loanId);
  if (!loan) return 0;
  return Math.round((loan.totalRepayable - loanPaid(loanId)) * 100) / 100;
}

function clientName(clientId) {
  const c = state.clients.find(c => c.id === clientId);
  return c ? c.fullName : '—';
}

function isOverdue(loan) {
  if (loan.status !== 'Active') return false;
  const schedule = ensureSchedule(loan);
  return schedule.some(s => s.status === 'Overdue');
}

function daysOverdue(loan) {
  const schedule = ensureSchedule(loan);
  const overdue = schedule.filter(s => s.status === 'Overdue');
  if (overdue.length === 0) return 0;
  const oldest = overdue.reduce((a, b) => a.dueDate < b.dueDate ? a : b);
  return daysBetween(oldest.dueDate, today());
}

  await logAudit('login', 'user', data.user.id, { username: data.user.email });
  return { ok: true };
}

    await logAudit('logout', 'user', state.currentUser.id, { username: state.currentUser.email });

  if (data?.session?.user) {
    const { data: profile } = await db.from('profiles').select('*').eq('id', data.session.user.id).maybeSingle();

    }

}

      <div class="text-xs text-slate-500 text-center mt-4">Users are managed by the administrator via the Supabase dashboard.</div>
    </div>
  `;
}

async function doLogin() {
  const email = document.getElementById('li-email').value.trim();
  const password = document.getElementById('li-password').value;
  if (!email || !password) { showAlert('Enter both email and password.'); return; }
  const btn = document.getElementById('li-btn');
  btn.disabled = true; btn.textContent = 'Signing in...';
  const result = await attemptLogin(email, password);
  btn.disabled = false; btn.textContent = 'Sign In';
  if (!result.ok) { showAlert(result.msg, 'Sign In Failed'); return; }
  await loadData();
  renderApp();
}

function buildUserInfo() {
  const u = state.currentUser;
  if (!u) return;
  document.getElementById('user-info').innerHTML = `
    <div class="font-medium text-slate-900 text-sm">${escapeHtml(u.fullName)}</div>
    <div class="flex items-center justify-between mt-1">
      <span class="badge badge-${u.role.toLowerCase().replace(' ','')}">${escapeHtml(u.role)}</span>

    </div>
  `;
}

function navigate(view) {
  state.currentView = view;
  buildNav();
  render();
}

function renderApp() {
  if (!state.currentUser) { renderLogin(); return; }
  document.getElementById('login-container').classList.add('hidden');
  document.getElementById('app-container').classList.remove('hidden');
  buildNav();
  buildUserInfo();
  // Refresh schedules on app load
  reallocateAllSchedules();
  render();
}

function render() {
  const c = document.getElementById('view-container');
  const v = state.currentView;
  if (v === 'dashboard') c.innerHTML = renderDashboard();
  else if (v === 'loans') c.innerHTML = renderLoans();
  else if (v === 'clients') c.innerHTML = renderClients();
  else if (v === 'payments') c.innerHTML = renderPayments();
  else if (v === 'reminders') c.innerHTML = renderReminders();
  else if (v === 'reports') c.innerHTML = renderReports();
  else if (v === 'users') c.innerHTML = renderUsers();
  else if (v === 'audit') c.innerHTML = renderAudit();
  else if (v === 'data') c.innerHTML = renderDataManagement();
  else if (v === 'settings') c.innerHTML = renderSettings();
  // After DOM is ready, init any charts for dashboard
  if (v === 'dashboard') setTimeout(initDashboardCharts, 50);
}

function renderDashboard() {
  const activeLoans = state.loans.filter(l => l.status === 'Active');
  const totalOutstanding = activeLoans.reduce((s, l) => s + loanOutstanding(l.id), 0);
  const totalDisbursed = activeLoans.reduce((s, l) => s + l.principal, 0);
  const thisMonth = new Date().toISOString().slice(0, 7);
  const collectionsMTD = state.payments.filter(p => p.paymentDate.startsWith(thisMonth)).reduce((s, p) => s + p.amount, 0);
  const overdueLoans = state.loans.filter(isOverdue);
  const overdueAmount = overdueLoans.reduce((s, l) => {
    return s + ensureSchedule(l).filter(i => i.status === 'Overdue').reduce((x, i) => x + (i.amountDue - i.amountPaid), 0);
  }, 0);

  // Expected today
  const today_ = today();
  const dueToday = state.loans.flatMap(l => ensureSchedule(l).filter(i => i.dueDate === today_ && i.status !== 'Paid').map(i => ({ loan: l, inst: i })));
  const expectedToday = dueToday.reduce((s, x) => s + (x.inst.amountDue - x.inst.amountPaid), 0);

  const recentLoans = [...state.loans].sort((a,b) => b.disbursementDate.localeCompare(a.disbursementDate)).slice(0, 5);
  const recentPayments = [...state.payments].sort((a,b) => b.paymentDate.localeCompare(a.paymentDate)).slice(0, 5);

  return `
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-slate-900">Dashboard</h1>
      <p class="text-slate-500 text-sm mt-1">Overview of loan portfolio and collections</p>

      <div class="card p-5"><div class="text-xs font-medium text-slate-500 uppercase">Total Outstanding</div><div class="text-3xl font-bold text-blue-700 mt-2">${fmt(totalOutstanding)}</div><div class="text-xs text-slate-500 mt-1">Receivables</div></div>
      <div class="card p-5"><div class="text-xs font-medium text-slate-500 uppercase">Collections MTD</div><div class="text-3xl font-bold text-green-700 mt-2">${fmt(collectionsMTD)}</div><div class="text-xs text-slate-500 mt-1">${state.payments.filter(p => p.paymentDate.startsWith(thisMonth)).length} payments</div></div>
      <div class="card p-5"><div class="text-xs font-medium text-slate-500 uppercase">Overdue</div><div class="text-3xl font-bold text-red-700 mt-2">${overdueLoans.length}</div><div class="text-xs text-slate-500 mt-1">${fmt(overdueAmount)} arrears</div></div>
    </div>

    <div class="card p-5 mb-6 bg-blue-50 border-blue-200">
      <div class="flex justify-between items-center">
        <div>
          <div class="text-xs font-medium text-blue-900 uppercase">Expected Today</div>
          <div class="text-2xl font-bold text-blue-900 mt-1">${fmt(expectedToday)}</div>
          <div class="text-xs text-blue-700 mt-1">${dueToday.length} instalment(s) due today</div>
        </div>
        <button onclick="navigate('reports'); state.currentReportTab='daily'; render();" class="btn-primary">View Collection Sheet</button>
      </div>
    </div>

    <!-- Charts row -->
    <div class="grid grid-cols-2 gap-6 mb-6">
      <div class="card p-5">
        <h3 class="font-semibold text-slate-900 mb-3">Collections — Last 30 Days</h3>
        <div style="position:relative;height:240px"><canvas id="chart-collections"></canvas></div>
      </div>
      <div class="card p-5">
        <h3 class="font-semibold text-slate-900 mb-3">Loan Status Distribution</h3>

        <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center">
          <h3 class="font-semibold text-slate-900">Recent Loans</h3>
          <button onclick="navigate('loans')" class="text-sm text-blue-700 font-medium">View all →</button>
        </div>
        <div class="p-2">
          ${recentLoans.length === 0 ? '<div class="p-6 text-center text-slate-500 text-sm">No loans yet</div>' :
            recentLoans.map(l => `
              <div class="px-4 py-3 hover:bg-slate-50 rounded-lg cursor-pointer" onclick="openLoanDetail('${l.id}')">

                </div>

        </div>
      </div>

  `;

function renderLoans() {
  const f = state.filters.loans;
  const q = (f.search || '').toLowerCase().trim();
  let filtered = [...state.loans];
  if (q) {
    filtered = filtered.filter(l => {
      const c = state.clients.find(c => c.id === l.clientId);
      return (l.id || '').toLowerCase().includes(q) ||
             (c?.fullName || '').toLowerCase().includes(q) ||
             (c?.phone || '').includes(q) ||
             (c?.idNumber || '').toLowerCase().includes(q);
    });
  }
  if (f.status !== 'all') {
    if (f.status === 'Overdue') filtered = filtered.filter(l => isOverdue(l));
    else filtered = filtered.filter(l => l.status === f.status);
  }
  if (f.officer !== 'all') filtered = filtered.filter(l => l.createdBy === f.officer);

  const selectedCount = state.bulkSelection.loans.size;
  const allOnPageSelected = filtered.length > 0 && filtered.every(l => state.bulkSelection.loans.has(l.id));
  const officers = [...new Set(state.loans.map(l => l.createdBy).filter(Boolean))]
    .map(id => state.users.find(u => u.id === id))
    .filter(Boolean);

  return `
    <div class="mb-6 flex justify-between items-center">
      <div><h1 class="text-2xl font-bold text-slate-900">Loans</h1><p class="text-slate-500 text-sm mt-1">${state.loans.length} total · ${filtered.length} shown${selectedCount ? ` · <span class="text-blue-700 font-medium">${selectedCount} selected</span>` : ''}</p></div>
      <div class="flex gap-2">
        ${selectedCount > 0 && can('update','loans') ? `<button onclick="openBulkLoanActions()" class="text-sm bg-amber-600 hover:bg-amber-700 text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2">Bulk Actions (${selectedCount}) <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg></button>` : ''}
        ${can('create','loans') ? `<button onclick="openLoanForm()" class="btn-primary flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>New Loan</button>` : ''}
      </div>
    </div>
    <div class="card p-4 mb-4">
      <div class="grid grid-cols-4 gap-3">
        <div class="col-span-2 relative">
          <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text" placeholder="Search loan ID, client name, phone, or ID..." style="padding-left: 36px;" value="${escapeHtml(f.search || '')}" oninput="state.filters.loans.search = this.value; debouncedRender();">
        </div>
        <select onchange="state.filters.loans.status = this.value; render();">
          <option value="all" ${f.status==='all'?'selected':''}>All statuses</option>
          <option value="Active" ${f.status==='Active'?'selected':''}>Active</option>
          <option value="Pending" ${f.status==='Pending'?'selected':''}>Pending</option>
          <option value="Overdue" ${f.status==='Overdue'?'selected':''}>Overdue</option>
          <option value="Completed" ${f.status==='Completed'?'selected':''}>Completed</option>
          <option value="Defaulted" ${f.status==='Defaulted'?'selected':''}>Defaulted</option>
          <option value="Written Off" ${f.status==='Written Off'?'selected':''}>Written Off</option>
        </select>
        ${officers.length > 1 ? `<select onchange="state.filters.loans.officer = this.value; render();">
          <option value="all" ${f.officer==='all'?'selected':''}>All officers</option>
          ${officers.map(o => `<option value="${o.id}" ${f.officer===o.id?'selected':''}>${escapeHtml(o.fullName)}</option>`).join('')}
        </select>` : '<div></div>'}
      </div>
      ${(f.search || f.status !== 'all' || f.officer !== 'all') ? `<div class="mt-3"><button onclick="state.filters.loans={search:'',status:'all',officer:'all'}; render();" class="text-xs text-blue-700 hover:underline">Clear filters</button></div>` : ''}
    </div>
    <div class="card overflow-hidden">
      ${filtered.length === 0 ? `
        <div class="p-12 text-center">
          <h3 class="font-medium text-slate-900">${state.loans.length === 0 ? 'No loans yet' : 'No loans match your filters'}</h3>
          <p class="text-sm text-slate-500 mt-1">${state.loans.length === 0 ? 'Create your first loan to get started' : 'Try adjusting search or filters'}</p>
          ${state.loans.length === 0 && can('create','loans') ? '<button onclick="openLoanForm()" class="btn-primary mt-4">Create Loan</button>' : ''}
        </div>` : `
        <table>
          <thead><tr>
            ${can('update','loans') ? `<th style="width:32px"><input type="checkbox" ${allOnPageSelected ? 'checked' : ''} onchange="toggleSelectAllLoans(this.checked, ${JSON.stringify(filtered.map(l=>l.id)).replace(/"/g,'&quot;')})"></th>` : ''}
            <th>Loan ID</th><th>Client</th><th>Principal</th><th>Outstanding</th><th>Maturity</th><th>Status</th>
          </tr></thead>
          <tbody>
            ${filtered.map(l => {
              const overdue = isOverdue(l);
              const status = overdue ? 'Overdue' : l.status;
              const checked = state.bulkSelection.loans.has(l.id);
              return `
                <tr class="clickable">
                  ${can('update','loans') ? `<td onclick="event.stopPropagation();"><input type="checkbox" ${checked ? 'checked' : ''} onchange="toggleLoanSelection('${l.id}', this.checked)"></td>` : ''}
                  <td class="font-mono text-xs" onclick="openLoanDetail('${l.id}')">${l.id}</td>
                  <td class="font-medium" onclick="openLoanDetail('${l.id}')">${escapeHtml(clientName(l.clientId))}</td>
                  <td onclick="openLoanDetail('${l.id}')">${fmt(l.principal)}</td>
                  <td class="font-medium" onclick="openLoanDetail('${l.id}')">${fmt(loanOutstanding(l.id))}</td>
                  <td onclick="openLoanDetail('${l.id}')">${fmtDate(l.maturityDate)}</td>
                  <td onclick="openLoanDetail('${l.id}')"><span class="badge badge-${status.toLowerCase()}">${status}</span></td>
                </tr>`;
            }).join('')}
          </tbody>
        </table>`}
    </div>
  `;
}

          </div>
          <div class="grid grid-cols-2 gap-4">
            <div><label>Disbursement Date *</label><input type="date" id="f-disbDate" value="${editing?.disbursementDate || today()}" required></div>

              <option value="Pending" ${editing.status==='Pending'?'selected':''}>Pending</option>
              <option value="Active" ${editing.status==='Active'?'selected':''}>Active</option>
              <option value="Completed" ${editing.status==='Completed'?'selected':''}>Completed</option>
              <option value="Defaulted" ${editing.status==='Defaulted'?'selected':''}>Defaulted</option>
              <option value="Written Off" ${editing.status==='Written Off'?'selected':''}>Written Off</option>
            </select></div>` : ''}
          </div>
          <div><label>Purpose</label><input type="text" id="f-purpose" value="${escapeHtml(editing?.purpose || '')}" placeholder="e.g. Business expansion, school fees"></div>
          <div class="bg-slate-50 rounded-lg p-4 grid grid-cols-3 gap-4">
            <div><div class="text-xs text-slate-500 uppercase">Total Repayable</div><div id="calc-total" class="text-xl font-bold text-slate-900">N$ 0.00</div></div>
            <div><div class="text-xs text-slate-500 uppercase">Monthly Installment</div><div id="calc-monthly" class="text-xl font-bold text-blue-700">N$ 0.00</div></div>
            <div><div class="text-xs text-slate-500 uppercase">APR (disclosed)</div><div id="calc-apr" class="text-xl font-bold text-amber-700">0.00%</div></div>

        </div>
        <div class="px-6 py-4 border-t border-slate-200 flex justify-end gap-2">
          <button onclick="closeModal()" class="btn-secondary">Cancel</button>
          <button onclick="saveLoan('${editId || ''}')" class="btn-primary">${editing ? 'Save Changes' : 'Create Loan'}</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('modal-container').innerHTML = modal;
  if (editing) updateLoanCalc();
}

function updateLoanCalc() {
  const p = parseFloat(document.getElementById('f-principal').value) || 0;
  const r = parseFloat(document.getElementById('f-rate').value) || 0;
  const t = parseInt(document.getElementById('f-term').value) || 1;
  const { totalRepayable, monthlyInstallment } = calcLoan(p, r, t);
  document.getElementById('calc-total').textContent = fmt(totalRepayable);
  document.getElementById('calc-monthly').textContent = fmt(monthlyInstallment);
  const apr = calculateAPR(p, monthlyInstallment, t);
  document.getElementById('calc-apr').textContent = apr.toFixed(2) + '%';
}

async function saveLoan(editId) {
  const clientId = document.getElementById('f-clientId').value;
  const principal = parseFloat(document.getElementById('f-principal').value);
  const rate = parseFloat(document.getElementById('f-rate').value);
  const term = parseInt(document.getElementById('f-term').value);
  const disbDate = document.getElementById('f-disbDate').value;
  const purpose = document.getElementById('f-purpose').value;
  const productEl = document.getElementById('f-productId');
  const productId = productEl ? productEl.value : '';
  if (!clientId || !principal || !rate || !term || !disbDate) { showAlert('Please fill all required fields.'); return; }

  if (productId) {
    const product = state.products.find(p => p.id === productId);
    if (product) {
      if (principal < product.minPrincipal || principal > product.maxPrincipal) {
        showAlert(`Principal must be between ${fmt(product.minPrincipal)} and ${fmt(product.maxPrincipal)} for the "${product.name}" product.`, 'Out of Range');
        return;
      }
    }
  }

  const { totalRepayable, monthlyInstallment } = calcLoan(principal, rate, term);
  const matDate = new Date(disbDate);
  matDate.setMonth(matDate.getMonth() + term);
  const maturityDate = matDate.toISOString().split('T')[0];

  if (editId) {
    const before = state.loans.find(l => l.id === editId);
    const statusEl = document.getElementById('f-status');
    const record = {
      principal, interest_rate: rate, term_months: term,
      disbursement_date: disbDate, maturity_date: maturityDate,
      total_repayable: totalRepayable, monthly_installment: monthlyInstallment, purpose
    };
    if (statusEl) record.status = statusEl.value;
    // Regenerate schedule if core terms changed
    if (before.principal !== principal || before.interestRate !== rate || before.termMonths !== term || before.disbursementDate !== disbDate) {
      record.schedule = generateSchedule({ ...before, principal, interestRate: rate, termMonths: term, disbursementDate: disbDate, totalRepayable, monthlyInstallment });
    }
    const { error } = await db.from('loans').update(record).eq('id', editId);
    if (error) { showAlert('Save failed: ' + error.message); return; }
    await logAudit('update', 'loan', editId, { changes: record });
  } else {
    const record = {
      client_id: clientId,
      product_id: productId || null,
      principal, interest_rate: rate, term_months: term,
      disbursement_date: disbDate, maturity_date: maturityDate,
      total_repayable: totalRepayable, monthly_installment: monthlyInstallment,
      status: 'Active', purpose,
      created_by: state.currentUser?.id || null
    };
    record.schedule = generateSchedule({ ...record, disbursementDate: disbDate, termMonths: term, totalRepayable, monthlyInstallment });
    const { data, error } = await db.from('loans').insert(record).select().single();
    if (error) { showAlert('Save failed: ' + error.message); return; }
    await logAudit('create', 'loan', data.id, { clientId, productId, principal, rate, term });
  }
  await saveTable('loans');
  closeModal();
  render();
}

async function deleteLoan(loanId) {
  if (!requirePerm('delete','loans')) return;
  const loan = state.loans.find(l => l.id === loanId);
  if (!loan) return;
  const payments = state.payments.filter(p => p.loanId === loanId);
  let msg = `Delete loan ${loanId.slice(0,8)} for ${clientName(loan.clientId)}?`;
  if (payments.length > 0) msg += `\n\nThis will also delete ${payments.length} associated payment(s) totalling ${fmt(payments.reduce((s,p)=>s+p.amount,0))}.`;
  msg += '\n\nThis cannot be undone.';
  confirmAction(msg, async () => {
    const { error } = await db.from('loans').delete().eq('id', loanId);
    if (error) { showAlert('Delete failed: ' + error.message); return; }
    await logAudit('delete', 'loan', loanId, { snapshot: loan });
    await saveTable('loans');
    await saveTable('payments');
    closeModal();
    render();
  });
}

async function loadExistingKycPreview(clientId) {
  const docs = await loadAllKyc(clientId);
  ['photo', 'id', 'income'].forEach(t => {
    const el = document.getElementById(`kyc-preview-${t}`);
    if (el && docs[t]) {

async function saveClient(editId) {
  const fullName = document.getElementById('c-fullName').value.trim();
  const idNumber = document.getElementById('c-idNumber').value.trim();
  const phone = document.getElementById('c-phone').value.trim();
  if (!fullName || !idNumber || !phone) { showAlert('Full name, ID number and phone are required.'); return; }
  const record = {
    full_name: fullName,
    id_number: idNumber,
    phone,
    alt_phone: document.getElementById('c-altPhone').value.trim() || null,
    email: document.getElementById('c-email').value.trim() || null,
    address: document.getElementById('c-address').value.trim() || null,
    employer: document.getElementById('c-employer').value.trim() || null,
    monthly_income: parseFloat(document.getElementById('c-income').value) || 0,
    emergency_contact: document.getElementById('c-emergency').value.trim() || null
  };
  if (editId) {
    const statusEl = document.getElementById('c-status');
    if (statusEl) record.status = statusEl.value;
    const { error } = await db.from('clients').update(record).eq('id', editId);
    if (error) { showAlert('Save failed: ' + error.message); return; }
    await saveKycDocuments(editId);
    await logAudit('update', 'client', editId, { changes: record });
  } else {
    record.status = 'Active';
    record.registration_date = today();
    record.created_by = state.currentUser?.id || null;
    const { data, error } = await db.from('clients').insert(record).select().single();
    if (error) { showAlert('Save failed: ' + error.message); return; }
    await saveKycDocuments(data.id);
    await logAudit('create', 'client', data.id, { fullName, idNumber, phone });
  }
  await saveTable('clients');
  closeModal();
  render();
}

async function deleteClient(clientId) {
  if (!requirePerm('delete','clients')) return;
  const client = state.clients.find(c => c.id === clientId);
  if (!client) return;
  const loans = state.loans.filter(l => l.clientId === clientId);
  if (loans.length > 0) { showAlert(`Cannot delete: ${client.fullName} has ${loans.length} loan(s) on record. Delete the loans first.`, 'Cannot Delete'); return; }
  confirmAction(`Delete client "${client.fullName}"?\n\nThis cannot be undone.`, async () => {
    const { error } = await db.from('clients').delete().eq('id', clientId);
    if (error) { showAlert('Delete failed: ' + error.message); return; }
    await logAudit('delete', 'client', clientId, { snapshot: client });
    await saveTable('clients');
    closeModal();
    render();
  });
}

function renderPayments() {
  const f = state.filters.payments;
  const q = (f.search || '').toLowerCase().trim();
  let filtered = [...state.payments];
  if (q) {
    filtered = filtered.filter(p => {
      const c = state.clients.find(c => c.id === p.clientId);
      return (p.id || '').toLowerCase().includes(q) ||
             (p.loanId || '').toLowerCase().includes(q) ||
             (p.receiptNumber || '').toLowerCase().includes(q) ||
             (c?.fullName || '').toLowerCase().includes(q) ||
             (c?.phone || '').includes(q);
    });
  }
  if (f.method !== 'all') filtered = filtered.filter(p => p.method === f.method);
  if (f.from) filtered = filtered.filter(p => p.paymentDate >= f.from);
  if (f.to) filtered = filtered.filter(p => p.paymentDate <= f.to);
  const sorted = filtered.sort((a,b) => b.paymentDate.localeCompare(a.paymentDate));

  return `
    <div class="mb-6 flex justify-between items-center">
      <div><h1 class="text-2xl font-bold text-slate-900">Payments</h1><p class="text-slate-500 text-sm mt-1">${state.payments.length} total · ${sorted.length} shown · ${fmt(totalFiltered)} filtered total</p></div>
      ${can('create','payments') ? `<button onclick="openPaymentForm()" class="btn-primary flex items-center gap-2"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>Record Payment</button>` : ''}

      <div class="grid grid-cols-4 gap-3">
        <div class="col-span-2 relative">
          <svg class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text" placeholder="Search by client name, payment/loan ID, or receipt no..." style="padding-left: 36px;" value="${escapeHtml(f.search || '')}" oninput="state.filters.payments.search = this.value; debouncedRender();">
        </div>
        <select onchange="state.filters.payments.method = this.value; render();">
          <option value="all" ${f.method==='all'?'selected':''}>All methods</option>
          <option value="Cash" ${f.method==='Cash'?'selected':''}>Cash</option>
          <option value="Bank Transfer" ${f.method==='Bank Transfer'?'selected':''}>Bank Transfer</option>
          <option value="Mobile Money" ${f.method==='Mobile Money'?'selected':''}>Mobile Money</option>
          <option value="Cheque" ${f.method==='Cheque'?'selected':''}>Cheque</option>
        </select>
        <div class="grid grid-cols-2 gap-2">
          <input type="date" value="${f.from || ''}" placeholder="From" onchange="state.filters.payments.from = this.value; render();" title="From date">
          <input type="date" value="${f.to || ''}" placeholder="To" onchange="state.filters.payments.to = this.value; render();" title="To date">
        </div>
      </div>
      ${(f.search || f.method !== 'all' || f.from || f.to) ? `<div class="mt-3"><button onclick="state.filters.payments={search:'',method:'all',from:'',to:''}; render();" class="text-xs text-blue-700 hover:underline">Clear filters</button></div>` : ''}
    </div>
    <div class="card overflow-hidden">
      ${sorted.length === 0 ? `
        <div class="p-12 text-center">
          <h3 class="font-medium text-slate-900">${state.payments.length === 0 ? 'No payments yet' : 'No payments match your filters'}</h3>
          <p class="text-sm text-slate-500 mt-1">${state.payments.length === 0 ? 'Record a payment against an active loan' : 'Try adjusting search or filters'}</p>
          ${state.payments.length === 0 && can('create','payments') ? '<button onclick="openPaymentForm()" class="btn-primary mt-4">Record Payment</button>' : ''}
        </div>` : `
        <table>
          <thead><tr><th>Payment ID</th><th>Date</th><th>Client</th><th>Loan</th><th>Amount</th><th>Method</th><th>Receipt</th><th class="text-right">Actions</th></tr></thead>
          <tbody>
            ${sorted.map(p => `<tr><td class="font-mono text-xs">${p.id}</td><td>${fmtDate(p.paymentDate)}</td><td class="font-medium">${escapeHtml(clientName(p.clientId))}</td><td class="font-mono text-xs">${p.loanId}</td><td class="font-medium text-green-700">${fmt(p.amount)}</td><td>${escapeHtml(p.method)}</td><td class="font-mono text-xs">${escapeHtml(p.receiptNumber || '—')}</td><td class="text-right whitespace-nowrap"><button onclick="downloadReceipt('${p.id}')" class="text-xs text-blue-700 hover:underline mr-3" title="Receipt PDF">Receipt</button><button onclick="shareReceiptWhatsApp('${p.id}')" class="text-xs text-green-700 hover:underline mr-3" title="WhatsApp">WhatsApp</button>${can('update','payments')?`<button onclick="openPaymentForm(null,'${p.id}')" class="text-xs text-slate-600 hover:underline mr-3">Edit</button>`:''}${can('delete','payments')?`<button onclick="deletePayment('${p.id}')" class="text-xs text-red-600 hover:underline">Delete</button>`:''}</td></tr>`).join('')}
          </tbody>
        </table>`}
    </div>
  `;

    <div class="fixed inset-0 modal-backdrop flex items-center justify-center z-50 p-4" onclick="if(event.target===this) closeModal()">

            <div><label>Payment Date *</label><input type="date" id="p-date" value="${editing?.paymentDate || today()}" required></div>
            <div><label>Amount (N$) *</label><input type="number" id="p-amount" min="0.01" step="0.01" value="${editing?.amount || ''}" required></div>
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div><label>Method *</label><select id="p-method" required>
              <option value="Cash" ${editing?.method==='Cash'?'selected':''}>Cash</option>

function updatePaymentInfo() {
  const loanId = document.getElementById('p-loanId').value;
  const info = document.getElementById('payment-info');
  if (!loanId) { info.className = 'hidden'; return; }
  const loan = state.loans.find(l => l.id === loanId);
  const outstanding = loanOutstanding(loanId);
  info.className = 'bg-slate-50 rounded-lg p-3 text-sm';
  info.innerHTML = `<div class="grid grid-cols-3 gap-2"><div><span class="text-slate-500">Monthly:</span> <strong>${fmt(loan.monthlyInstallment)}</strong></div><div><span class="text-slate-500">Outstanding:</span> <strong>${fmt(outstanding)}</strong></div><div><span class="text-slate-500">Matures:</span> <strong>${fmtDate(loan.maturityDate)}</strong></div></div>`;
  const amountEl = document.getElementById('p-amount');
  if (!amountEl.value) amountEl.value = Math.min(loan.monthlyInstallment, outstanding).toFixed(2);
}

async function savePayment(editId) {
  const loanId = document.getElementById('p-loanId').value;
  const amount = parseFloat(document.getElementById('p-amount').value);
  const date = document.getElementById('p-date').value;
  const method = document.getElementById('p-method').value;
  if (!loanId || !amount || !date) { showAlert('Please fill all required fields.'); return; }
  const loan = state.loans.find(l => l.id === loanId);
  const receiptNumber = document.getElementById('p-receipt').value.trim();
  const notes = document.getElementById('p-notes').value.trim();
  const otherPayments = state.payments.filter(p => p.loanId === loanId && p.id !== editId).reduce((s, p) => s + p.amount, 0);
  const outstandingExclThis = loan.totalRepayable - otherPayments;

  const doSave = async () => {
    const record = {
      payment_date: date, amount, method,
      receipt_number: receiptNumber || null,
      notes: notes || null
    };
    if (editId) {
      const { error } = await db.from('payments').update(record).eq('id', editId);
      if (error) { showAlert('Save failed: ' + error.message); return; }
      await logAudit('update', 'payment', editId, { changes: record });
    } else {
      record.loan_id = loanId;
      record.client_id = loan.clientId;
      record.created_by = state.currentUser?.id || null;
      const { data, error } = await db.from('payments').insert(record).select().single();
      if (error) { showAlert('Save failed: ' + error.message); return; }
      await logAudit('create', 'payment', data.id, { loanId, amount, method });
    }
    await saveTable('payments');
    // Recompute schedule allocation for this loan
    allocatePayments(loanId);
    const newOutstanding = loanOutstanding(loanId);
    let newStatus = null;
    if (newOutstanding <= 0.01 && loan.status !== 'Completed') newStatus = 'Completed';
    else if (newOutstanding > 0.01 && loan.status === 'Completed') newStatus = 'Active';
    if (newStatus) {
      const localLoan = state.loans.find(l => l.id === loanId);
      if (localLoan) localLoan.status = newStatus;
      await db.from('loans').update({ status: newStatus, schedule: localLoan.schedule }).eq('id', loanId);
    } else {
      // Save updated schedule
      const localLoan = state.loans.find(l => l.id === loanId);
      if (localLoan) await db.from('loans').update({ schedule: localLoan.schedule }).eq('id', loanId);
    }
    closeModal();
    render();
  };

  if (amount > outstandingExclThis + 0.01) {
    confirmAction(`Amount exceeds outstanding balance (${fmt(outstandingExclThis)}). Continue anyway?`, doSave, 'Continue', 'bg-blue-700 hover:bg-blue-800');
  } else {
    await doSave();
  }
}

async function deletePayment(paymentId) {
  if (!requirePerm('delete','payments')) return;
  const p = state.payments.find(x => x.id === paymentId);
  if (!p) return;
  confirmAction(`Delete payment of ${fmt(p.amount)} dated ${fmtDate(p.paymentDate)}?\n\nThis cannot be undone and will increase the loan's outstanding balance.`, async () => {
    const { error } = await db.from('payments').delete().eq('id', paymentId);
    if (error) { showAlert('Delete failed: ' + error.message); return; }
    await logAudit('delete', 'payment', paymentId, { snapshot: p });
    await saveTable('payments');
    // Re-evaluate loan status
    const loan = state.loans.find(l => l.id === p.loanId);
    if (loan) {
      allocatePayments(loan.id);
      const newStatus = (loan.status === 'Completed' && loanOutstanding(loan.id) > 0.01) ? 'Active' : loan.status;
      if (newStatus !== loan.status) loan.status = newStatus;
      await db.from('loans').update({ status: loan.status, schedule: loan.schedule }).eq('id', loan.id);
    }
    closeModal();
    render();
  });
}

function reportDailyCollection() {
  const today_ = today();
  const items = [];
  state.loans.forEach(l => {
    if (l.status !== 'Active') return;
    ensureSchedule(l).forEach(s => {
      if (s.status === 'Paid') return;
      if (s.dueDate <= today_) {
        items.push({ loan: l, inst: s, days: daysBetween(s.dueDate, today_), balance: s.amountDue - s.amountPaid });
      }
    });
  });
  items.sort((a, b) => a.inst.dueDate.localeCompare(b.inst.dueDate));
  const totalDue = items.reduce((s, x) => s + x.balance, 0);
  const dueTodayCount = items.filter(x => x.inst.dueDate === today_).length;
  const overdueCount = items.filter(x => x.inst.dueDate < today_).length;

  return `
    <div class="mb-4 flex justify-between items-center no-print">
      <div class="text-sm text-slate-600">Report date: <strong>${fmtDate(today_)}</strong></div>
      <button onclick="window.print()" class="btn-secondary text-sm">Print</button>
    </div>
    <div class="grid grid-cols-3 gap-4 mb-6">
      <div class="card p-4"><div class="text-xs text-slate-500 uppercase">Due Today</div><div class="text-2xl font-bold mt-1">${dueTodayCount}</div></div>
      <div class="card p-4"><div class="text-xs text-slate-500 uppercase">Overdue</div><div class="text-2xl font-bold text-red-700 mt-1">${overdueCount}</div></div>
      <div class="card p-4"><div class="text-xs text-slate-500 uppercase">Total Expected</div><div class="text-2xl font-bold text-blue-700 mt-1">${fmt(totalDue)}</div></div>
    </div>
    <div class="card overflow-hidden">
      <div class="px-6 py-4 border-b border-slate-200"><h3 class="font-semibold">Collection Sheet — ${fmtDate(today_)}</h3></div>
      ${items.length === 0 ? '<div class="p-12 text-center text-slate-500">Nothing due today and no overdue items. Clean book!</div>' : `
        <table>
          <thead><tr><th>Client</th><th>Phone</th><th>Loan</th><th>Inst #</th><th>Due Date</th><th>Days</th><th class="text-right">Amount Due</th></tr></thead>
          <tbody>
            ${items.map(x => {
              const c = state.clients.find(c => c.id === x.loan.clientId);
              const overdue = x.days > 0;
              return `<tr class="clickable" onclick="openLoanDetail('${x.loan.id}')"><td class="font-medium">${escapeHtml(c?.fullName || '—')}</td><td>${escapeHtml(c?.phone || '—')}</td><td class="font-mono text-xs">${x.loan.id}</td><td>${x.inst.instalmentNo}</td><td>${fmtDate(x.inst.dueDate)}</td><td>${overdue ? `<span class="text-red-700 font-medium">${x.days}d late</span>` : 'today'}</td><td class="text-right font-medium">${fmt(x.balance)}</td></tr>`;
            }).join('')}
            <tr><td colspan="6" class="text-right font-semibold">TOTAL</td><td class="text-right font-bold">${fmt(totalDue)}</td></tr>
          </tbody>
        </table>`}
    </div>
  `;
}

function reportAgeing() {
  const today_ = today();
  const buckets = { current: [], '1-30': [], '31-60': [], '61-90': [], '90+': [] };
  state.loans.forEach(l => {
    if (l.status === 'Completed' || l.status === 'Written Off') return;
    ensureSchedule(l).forEach(s => {
      if (s.status === 'Paid') return;
      const balance = s.amountDue - s.amountPaid;
      if (balance <= 0.01) return;
      const days = daysBetween(s.dueDate, today_);
      const entry = { loan: l, inst: s, days, balance };
      if (days <= 0) buckets.current.push(entry);
      else if (days <= 30) buckets['1-30'].push(entry);
      else if (days <= 60) buckets['31-60'].push(entry);
      else if (days <= 90) buckets['61-90'].push(entry);
      else buckets['90+'].push(entry);
    });
  });
  const sumOf = (b) => b.reduce((s, x) => s + x.balance, 0);
  const total = Object.values(buckets).reduce((s, b) => s + sumOf(b), 0);

  const bucketCard = (label, items, color) => `
    <div class="card p-4"><div class="text-xs text-slate-500 uppercase">${label}</div><div class="text-2xl font-bold ${color} mt-1">${fmt(sumOf(items))}</div><div class="text-xs text-slate-500 mt-1">${items.length} instalment(s)</div></div>
  `;

  return `
    <div class="mb-4 flex justify-between items-center no-print">
      <div class="text-sm text-slate-600">As at: <strong>${fmtDate(today_)}</strong></div>
      <button onclick="window.print()" class="btn-secondary text-sm">Print</button>
    </div>
    <div class="grid grid-cols-5 gap-4 mb-6">
      ${bucketCard('Current', buckets.current, 'text-slate-900')}
      ${bucketCard('1–30 days', buckets['1-30'], 'text-amber-700')}
      ${bucketCard('31–60 days', buckets['31-60'], 'text-orange-700')}
      ${bucketCard('61–90 days', buckets['61-90'], 'text-red-700')}
      ${bucketCard('90+ days', buckets['90+'], 'text-red-900')}
    </div>
    <div class="card p-4 mb-6 bg-blue-50">
      <div class="text-xs text-blue-900 uppercase">Total Receivables</div>
      <div class="text-2xl font-bold text-blue-900 mt-1">${fmt(total)}</div>
    </div>
    ${['90+','61-90','31-60','1-30','current'].map(k => {
      const items = buckets[k];
      if (items.length === 0) return '';
      const label = k === 'current' ? 'Current (not yet due)' : k + ' days overdue';
      return `
        <div class="card overflow-hidden mb-4">
          <div class="px-6 py-3 border-b border-slate-200 bg-slate-50 flex justify-between"><h3 class="font-semibold">${label}</h3><span class="text-sm text-slate-600">${fmt(sumOf(items))}</span></div>
          <table>
            <thead><tr><th>Client</th><th>Loan</th><th>Inst #</th><th>Due Date</th><th>Days</th><th class="text-right">Balance</th></tr></thead>
            <tbody>
              ${items.map(x => {
                const c = state.clients.find(c => c.id === x.loan.clientId);
                return `<tr class="clickable" onclick="openLoanDetail('${x.loan.id}')"><td class="font-medium">${escapeHtml(c?.fullName || '—')}</td><td class="font-mono text-xs">${x.loan.id}</td><td>${x.inst.instalmentNo}</td><td>${fmtDate(x.inst.dueDate)}</td><td>${x.days > 0 ? x.days + 'd' : '—'}</td><td class="text-right font-medium">${fmt(x.balance)}</td></tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      `;
    }).join('')}
  `;
}

function reportPAR() {
  const today_ = today();
  const thresholds = [1, 30, 60, 90];
  const results = thresholds.map(t => {
    let atRisk = 0, totalPortfolio = 0;
    state.loans.forEach(l => {
      if (l.status === 'Completed' || l.status === 'Written Off') return;
      const outstanding = loanOutstanding(l.id);
      totalPortfolio += outstanding;
      const hasOverdueBeyond = ensureSchedule(l).some(s => {
        if (s.status === 'Paid' || s.amountDue - s.amountPaid <= 0.01) return false;
        return daysBetween(s.dueDate, today_) > t;
      });
      if (hasOverdueBeyond) atRisk += outstanding;
    });
    return { threshold: t, atRisk, totalPortfolio, ratio: totalPortfolio > 0 ? (atRisk / totalPortfolio) * 100 : 0 };
  });

  const par30 = results.find(r => r.threshold === 30);
  return `
    <div class="mb-4 flex justify-between items-center no-print">
      <div class="text-sm text-slate-600">As at: <strong>${fmtDate(today_)}</strong></div>
      <button onclick="window.print()" class="btn-secondary text-sm">Print</button>
    </div>
    <div class="card p-6 mb-6 bg-blue-50">
      <div class="text-xs text-blue-900 uppercase font-medium">PAR 30 (Industry Benchmark)</div>
      <div class="text-4xl font-bold text-blue-900 mt-2">${par30.ratio.toFixed(2)}%</div>
      <div class="text-sm text-blue-800 mt-2">${fmt(par30.atRisk)} at risk out of ${fmt(par30.totalPortfolio)} total portfolio</div>
      <div class="text-xs text-blue-700 mt-3">Healthy: &lt;5% · Warning: 5–10% · Critical: &gt;10%</div>
    </div>
    <div class="card overflow-hidden">
      <div class="px-6 py-3 border-b border-slate-200 bg-slate-50"><h3 class="font-semibold">Portfolio at Risk by Threshold</h3></div>
      <table>
        <thead><tr><th>PAR Bucket</th><th>Amount at Risk</th><th>Total Portfolio</th><th class="text-right">PAR Ratio</th></tr></thead>
        <tbody>
          ${results.map(r => `<tr><td class="font-medium">PAR ${r.threshold}+ days</td><td>${fmt(r.atRisk)}</td><td>${fmt(r.totalPortfolio)}</td><td class="text-right font-bold ${r.ratio > 10 ? 'text-red-700' : r.ratio > 5 ? 'text-amber-700' : 'text-green-700'}">${r.ratio.toFixed(2)}%</td></tr>`).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function buildClientStatement(clientId) {
  const c = state.clients.find(x => x.id === clientId);
  if (!c) return '<div>Client not found</div>';
  const loans = state.loans.filter(l => l.clientId === clientId);
  const allPayments = state.payments.filter(p => p.clientId === clientId).sort((a,b) => a.paymentDate.localeCompare(b.paymentDate));
  const totalDisbursed = loans.reduce((s, l) => s + l.principal, 0);
  const totalRepayable = loans.reduce((s, l) => s + l.totalRepayable, 0);
  const totalPaid = allPayments.reduce((s, p) => s + p.amount, 0);
  const totalOutstanding = totalRepayable - totalPaid;

  return `
    <div class="card p-8">
      <div class="flex justify-between items-start mb-6">
        <div>
          <h2 class="text-xl font-bold text-slate-900">Client Statement</h2>

        <div><div class="text-xs text-slate-500 uppercase">Client</div><div class="font-semibold mt-1">${escapeHtml(c.fullName)}</div></div>
        <div><div class="text-xs text-slate-500 uppercase">Client ID</div><div class="font-mono text-sm mt-1">${c.id}</div></div>
        <div><div class="text-xs text-slate-500 uppercase">ID Number</div><div class="font-medium mt-1">${escapeHtml(c.idNumber)}</div></div>
        <div><div class="text-xs text-slate-500 uppercase">Phone</div><div class="font-medium mt-1">${escapeHtml(c.phone)}</div></div>
      </div>

      <div class="grid grid-cols-4 gap-4 mb-6">
        <div class="bg-slate-50 rounded-lg p-3"><div class="text-xs text-slate-500 uppercase">Total Disbursed</div><div class="font-bold text-lg mt-1">${fmt(totalDisbursed)}</div></div>
        <div class="bg-slate-50 rounded-lg p-3"><div class="text-xs text-slate-500 uppercase">Total Repayable</div><div class="font-bold text-lg mt-1">${fmt(totalRepayable)}</div></div>
        <div class="bg-green-50 rounded-lg p-3"><div class="text-xs text-green-800 uppercase">Total Paid</div><div class="font-bold text-lg text-green-800 mt-1">${fmt(totalPaid)}</div></div>
        <div class="bg-blue-50 rounded-lg p-3"><div class="text-xs text-blue-800 uppercase">Outstanding</div><div class="font-bold text-lg text-blue-800 mt-1">${fmt(totalOutstanding)}</div></div>
      </div>

      <h3 class="font-semibold mb-3">Loans</h3>
      ${loans.length === 0 ? '<div class="text-slate-500 mb-6">No loans on record</div>' : `
        <table class="mb-6">
          <thead><tr><th>Loan ID</th><th>Disbursed</th><th>Principal</th><th>Total Repayable</th><th>Paid</th><th>Outstanding</th><th>Status</th></tr></thead>
          <tbody>
            ${loans.map(l => `<tr><td class="font-mono text-xs">${l.id}</td><td>${fmtDate(l.disbursementDate)}</td><td>${fmt(l.principal)}</td><td>${fmt(l.totalRepayable)}</td><td>${fmt(loanPaid(l.id))}</td><td class="font-medium">${fmt(loanOutstanding(l.id))}</td><td><span class="badge badge-${(isOverdue(l)?'overdue':l.status).toLowerCase()}">${isOverdue(l)?'Overdue':l.status}</span></td></tr>`).join('')}
          </tbody>
        </table>`}

      <h3 class="font-semibold mb-3">Transaction History</h3>
      ${allPayments.length === 0 ? '<div class="text-slate-500">No payments on record</div>' : `
        <table>
          <thead><tr><th>Date</th><th>Loan</th><th>Amount</th><th>Method</th><th>Receipt</th></tr></thead>
          <tbody>
            ${allPayments.map(p => `<tr><td>${fmtDate(p.paymentDate)}</td><td class="font-mono text-xs">${p.loanId}</td><td class="font-medium text-green-700">${fmt(p.amount)}</td><td>${escapeHtml(p.method)}</td><td class="font-mono text-xs">${escapeHtml(p.receiptNumber || '—')}</td></tr>`).join('')}

        This statement is computer-generated. Please report any discrepancies to your loan officer immediately.
      </div>
    </div>
  `;
}

function reportOfficer() {
  // Group loans and payments by creator
  const officers = {};
  state.users.forEach(u => { officers[u.id] = { user: u, loansCreated: 0, principalDisbursed: 0, paymentsRecorded: 0, amountCollected: 0 }; });
  state.loans.forEach(l => { if (officers[l.createdBy]) { officers[l.createdBy].loansCreated++; officers[l.createdBy].principalDisbursed += l.principal; } });
  state.payments.forEach(p => { if (officers[p.createdBy]) { officers[p.createdBy].paymentsRecorded++; officers[p.createdBy].amountCollected += p.amount; } });
  const rows = Object.values(officers).filter(o => o.loansCreated > 0 || o.paymentsRecorded > 0).sort((a,b) => b.amountCollected - a.amountCollected);

  return `
    <div class="mb-4 flex justify-between items-center no-print">
      <div class="text-sm text-slate-600">All-time performance</div>
      <button onclick="window.print()" class="btn-secondary text-sm">Print</button>
    </div>
    <div class="card overflow-hidden">
      ${rows.length === 0 ? '<div class="p-12 text-center text-slate-500">No activity recorded yet</div>' : `
        <table>
          <thead><tr><th>Officer</th><th>Role</th><th class="text-right">Loans Created</th><th class="text-right">Principal Disbursed</th><th class="text-right">Payments Recorded</th><th class="text-right">Amount Collected</th></tr></thead>
          <tbody>
            ${rows.map(o => `<tr><td class="font-medium">${escapeHtml(o.user.fullName)}</td><td><span class="badge badge-${o.user.role.toLowerCase().replace(' ','')}">${escapeHtml(o.user.role)}</span></td><td class="text-right">${o.loansCreated}</td><td class="text-right font-medium">${fmt(o.principalDisbursed)}</td><td class="text-right">${o.paymentsRecorded}</td><td class="text-right font-medium text-green-700">${fmt(o.amountCollected)}</td></tr>`).join('')}

  `;
}

// =====================================================
// APR CALCULATION (NAMFISA disclosure requirement)
// =====================================================
function calculateAPR(principal, monthlyPayment, months) {
  if (principal <= 0 || monthlyPayment <= 0 || months <= 0) return 0;
  // Newton-Raphson to solve PV = M * (1 - (1+i)^-n) / i for monthly rate i
  let i = 0.05;
  for (let iter = 0; iter < 100; iter++) {
    if (i <= 0) i = 0.001;
    const f = monthlyPayment * (1 - Math.pow(1 + i, -months)) / i - principal;
    const fPrime = monthlyPayment * (months * Math.pow(1 + i, -months - 1) / i - (1 - Math.pow(1 + i, -months)) / (i * i));
    const newI = i - f / fPrime;
    if (Math.abs(newI - i) < 1e-9) { i = newI; break; }
    i = newI;
  }
  return i * 12 * 100; // nominal annual rate as percentage
}

async function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function compressImage(file, maxSize = 1200, quality = 0.75) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > maxSize || height > maxSize) {
          if (width > height) { height = Math.round((height / width) * maxSize); width = maxSize; }
          else { width = Math.round((width / height) * maxSize); height = maxSize; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        canvas.getContext('2d').drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function handleKycUpload(inputEl, kycType) {
  const file = inputEl.files[0];
  if (!file) return;
  const maxSizeMB = 4;
  if (file.size > maxSizeMB * 1024 * 1024) {
    showAlert(`File too large (max ${maxSizeMB}MB). Try a smaller file or take a clearer photo.`);
    inputEl.value = '';
    return;
  }
  try {
    let dataUrl;
    if (file.type.startsWith('image/')) {
      // Compress images, especially for client photos
      const maxDim = kycType === 'photo' ? 600 : 1400;
      dataUrl = await compressImage(file, maxDim, 0.75);
    } else {
      // PDFs and other docs — store as-is
      dataUrl = await fileToBase64(file);
    }
    state.pendingKyc[kycType] = { filename: file.name, mimeType: file.type, data: dataUrl, size: file.size };
    const previewEl = document.getElementById(`kyc-preview-${kycType}`);
    if (previewEl) previewEl.innerHTML = renderKycPreview(kycType, state.pendingKyc[kycType]);
  } catch (e) {
    showAlert('Could not process file: ' + e.message);
  }
}

function renderKycPreview(kycType, doc) {
  if (!doc) return '<span class="text-xs text-slate-500">No file</span>';
  const isImg = doc.mimeType.startsWith('image/');
  return `
    <div class="flex items-center gap-3 p-2 bg-slate-50 rounded-lg">
      ${isImg ? `<img src="${doc.data}" class="w-12 h-12 object-cover rounded">` : `<div class="w-12 h-12 bg-slate-200 rounded flex items-center justify-center text-slate-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg></div>`}
      <div class="flex-1 min-w-0">
        <div class="text-xs font-medium truncate">${escapeHtml(doc.filename || 'document')}</div>
        <div class="text-xs text-slate-500">${Math.round((doc.size || doc.data.length) / 1024)}KB</div>
      </div>
      <button onclick="removePendingKyc('${kycType}')" class="text-xs text-red-600 hover:underline">Remove</button>
    </div>
  `;
}

function removePendingKyc(kycType) {
  state.pendingKyc[kycType] = '__DELETE__';
  const previewEl = document.getElementById(`kyc-preview-${kycType}`);
  if (previewEl) previewEl.innerHTML = '<span class="text-xs text-slate-500">Marked for removal — save to confirm</span>';
  document.getElementById(`c-${kycType}-input`).value = '';
}

async function saveKycDocuments(clientId) {
  const updates = {};
  const typeMap = { photo: 'photo_url', id: 'id_document_url', income: 'income_document_url' };
  for (const kycType of ['photo', 'id', 'income']) {
    const pending = state.pendingKyc[kycType];
    if (!pending) continue;
    const urlField = typeMap[kycType];
    if (pending === '__DELETE__') {
      // Remove from storage and clear URL
      const client = state.clients.find(c => c.id === clientId);
      const url = client?.[urlField.replace(/_([a-z])/g, (_, c) => c.toUpperCase())];
      if (url) {
        const path = extractStoragePath(url);
        if (path) await db.storage.from('kyc-documents').remove([path]);
      }
      updates[urlField] = null;
    } else {
      // Upload to storage
      try {
        const ext = pending.filename.split('.').pop().toLowerCase();
        const path = `${clientId}/${kycType}_${Date.now()}.${ext}`;
        // Convert base64 data URL to Blob
        const res = await fetch(pending.data);
        const blob = await res.blob();
        const { error: upErr } = await db.storage.from('kyc-documents').upload(path, blob, { contentType: pending.mimeType, upsert: true });
        if (upErr) { console.error('Upload error:', upErr); showAlert(`Could not upload ${kycType}: ${upErr.message}`); continue; }
        const { data: urlData } = db.storage.from('kyc-documents').getPublicUrl(path);
        updates[urlField] = urlData.publicUrl;
      } catch (e) {
        console.error(e);
        showAlert(`Could not save ${kycType} document: ${e.message}`);
      }
    }
  }
  if (Object.keys(updates).length > 0) {
    await db.from('clients').update(updates).eq('id', clientId);
  }
  state.pendingKyc = {};
}

function extractStoragePath(url) {
  // Extract path after /kyc-documents/ in a Supabase public URL
  const match = url.match(/\/kyc-documents\/(.+)$/);
  return match ? match[1] : null;
}

async function loadKycDocument(clientId, kycType) {
  const client = state.clients.find(c => c.id === clientId);
  if (!client) return null;
  const urlField = { photo: 'photoUrl', id: 'idDocumentUrl', income: 'incomeDocumentUrl' }[kycType];
  const url = client[urlField];
  if (!url) return null;
  // Return a doc object compatible with existing UI
  const filename = url.split('/').pop() || `${kycType}.file`;
  const mimeType = filename.match(/\.(jpg|jpeg)$/i) ? 'image/jpeg' :
                   filename.match(/\.png$/i) ? 'image/png' :
                   filename.match(/\.pdf$/i) ? 'application/pdf' : 'application/octet-stream';
  return { filename, mimeType, data: url };
}

async function loadAllKyc(clientId) {
  const result = {};
  for (const kycType of ['photo', 'id', 'income']) {
    result[kycType] = await loadKycDocument(clientId, kycType);
  }
  return result;
}

function downloadDataUrl(dataUrl, filename) {
  const a = document.createElement('a');
  a.href = dataUrl;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

// =====================================================
function whatsappLink(phone, message) {
  // Strip non-digits, ensure starts with country code
  let num = (phone || '').replace(/[^0-9]/g, '');
  // Namibian numbers: if starts with 0, replace with 264
  if (num.startsWith('0')) num = '264' + num.substring(1);
  return `https://wa.me/${num}?text=${encodeURIComponent(message)}`;
}

function openWhatsApp(phone, message) {
  const url = whatsappLink(phone, message);
  if (typeof openLink === 'function') openLink(url);
  else window.open(url, '_blank');
}

// PDF GENERATION
// =====================================================
function generateLoanAgreement(loanId) {
  if (!window.jspdf) { showAlert('PDF library not loaded. Please wait a moment and try again.'); return; }
  const loan = state.loans.find(l => l.id === loanId);
  if (!loan) return;
  const client = state.clients.find(c => c.id === loan.clientId);
  const s = state.settings || {};
  const schedule = ensureSchedule(loan);
  const apr = calculateAPR(loan.principal, loan.monthlyInstallment, loan.termMonths);
  const financeCharge = loan.totalRepayable - loan.principal;
  const flatRate = loan.interestRate;

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a4' });
  const pageW = doc.internal.pageSize.getWidth();
  const margin = 18;
  let y = 16;

  // ---- HEADER ----
  doc.setFontSize(13).setFont('helvetica', 'bold');
  doc.text(s.companyName || 'Instant Cashloan', pageW/2, y, { align: 'center' }); y += 5;
  doc.setFontSize(9).setFont('helvetica', 'normal');
  if (s.namfisaReg) { doc.text(`Registered Microlender · NAMFISA Reg. No.: ${s.namfisaReg}`, pageW/2, y, { align: 'center' }); y += 4; }
  if (s.address) { doc.text(s.address, pageW/2, y, { align: 'center' }); y += 4; }
  if (s.phone || s.email) { doc.text(`${s.phone || ''}${s.phone && s.email ? ' · ' : ''}${s.email || ''}`, pageW/2, y, { align: 'center' }); y += 4; }
  y += 3;
  doc.setDrawColor(30, 64, 175).setLineWidth(0.5).line(margin, y, pageW - margin, y); y += 8;

  doc.setFontSize(14).setFont('helvetica', 'bold');
  doc.text('MICROLENDING AGREEMENT', pageW/2, y, { align: 'center' }); y += 5;
  doc.setFontSize(9).setFont('helvetica', 'normal');
  doc.text('Issued in terms of the Microlending Act, 2018 (Act No. 7 of 2018)', pageW/2, y, { align: 'center' }); y += 8;

  // ---- AGREEMENT METADATA ----
  doc.setFontSize(9);
  doc.text(`Agreement Reference: ${loan.id}`, margin, y);
  doc.text(`Date of Issue: ${fmtDate(today())}`, pageW - margin, y, { align: 'right' }); y += 6;

  // ---- PARTIES ----
  doc.setFontSize(11).setFont('helvetica', 'bold');
  doc.text('1. PARTIES', margin, y); y += 5;
  doc.setFontSize(9).setFont('helvetica', 'normal');
  doc.text(`THE LENDER:  ${s.companyName || 'Instant Cashloan'}`, margin, y); y += 4;
  if (s.namfisaReg) { doc.text(`             NAMFISA Reg. No.: ${s.namfisaReg}`, margin, y); y += 4; }
  if (s.address) { doc.text(`             Address: ${s.address}`, margin, y); y += 4; }
  y += 2;
  doc.text(`THE BORROWER: ${client?.fullName || '—'}`, margin, y); y += 4;
  doc.text(`              ID Number: ${client?.idNumber || '—'}`, margin, y); y += 4;
  doc.text(`              Phone: ${client?.phone || '—'}`, margin, y); y += 4;
  if (client?.address) { doc.text(`              Address: ${client.address}`, margin, y); y += 4; }
  y += 4;

  // ---- LOAN PARTICULARS ----
  doc.setFontSize(11).setFont('helvetica', 'bold');
  doc.text('2. LOAN PARTICULARS', margin, y); y += 5;
  doc.autoTable({
    startY: y,
    head: [['Item', 'Amount / Detail']],
    body: [
      ['Principal Amount (capital advanced)', fmt(loan.principal)],
      ['Finance Charge (interest)', fmt(financeCharge)],
      ['Total Cost of Credit', fmt(loan.totalRepayable)],
      ['Flat Interest Rate', `${flatRate}% over ${loan.termMonths} months`],
      ['Annual Percentage Rate (APR)', `${apr.toFixed(2)}% per annum`],
      ['Term of Loan', `${loan.termMonths} months`],
      ['Disbursement Date', fmtDate(loan.disbursementDate)],
      ['Final Repayment Date', fmtDate(loan.maturityDate)],
      ['Monthly Instalment', fmt(loan.monthlyInstallment)],
      ['Number of Instalments', `${loan.termMonths}`],
      ['Purpose of Loan', loan.purpose || 'Not specified']
    ],
    theme: 'grid',
    headStyles: { fillColor: [30, 64, 175], textColor: 255, fontStyle: 'bold', fontSize: 9 },
    bodyStyles: { fontSize: 9 },
    columnStyles: { 0: { cellWidth: 75 }, 1: { cellWidth: pageW - margin*2 - 75 } },
    margin: { left: margin, right: margin }
  });
  y = doc.lastAutoTable.finalY + 6;

  // ---- COST OF CREDIT DISCLOSURE ----
  doc.setFontSize(11).setFont('helvetica', 'bold');
  doc.text('3. COST OF CREDIT DISCLOSURE', margin, y); y += 5;
  doc.setFontSize(9).setFont('helvetica', 'normal');
  const disclosure = `For every N$1.00 borrowed, the Borrower agrees to repay a total of N$${(loan.totalRepayable/loan.principal).toFixed(2)} over the term of this agreement. The Annual Percentage Rate (APR) of ${apr.toFixed(2)}% includes all interest charges on the principal. The Borrower acknowledges that this disclosure has been made before signing.`;
  const lines = doc.splitTextToSize(disclosure, pageW - margin*2);
  doc.text(lines, margin, y); y += lines.length * 4 + 4;

  // Late Payment Penalty Disclosure (if enabled)
  const penaltyCfg = state.settings.penalty;
  if (penaltyCfg?.enabled) {
    if (y > 250) { doc.addPage(); y = 20; }
    doc.setFont('helvetica', 'bold').setFontSize(9);
    doc.text('Late Payment Penalty:', margin, y); y += 4;
    doc.setFont('helvetica', 'normal');
    const penDescParts = [];
    if (penaltyCfg.type === 'percentage') penDescParts.push(`${penaltyCfg.amount}% of the ${penaltyCfg.basis === 'instalment' ? 'overdue instalment' : 'outstanding balance'}`);
    else penDescParts.push(`a flat fee of ${fmt(penaltyCfg.amount)}`);
    penDescParts.push(`${penaltyCfg.frequency} basis`);
    penDescParts.push(`after a grace period of ${penaltyCfg.gracePeriodDays} day(s)`);
    if (penaltyCfg.maxPenaltyPercent < 100) penDescParts.push(`subject to a maximum cap of ${penaltyCfg.maxPenaltyPercent}% of principal`);
    const penText = `Late payments will accrue a penalty of ${penDescParts.join(', ')}. Penalties form part of the total outstanding balance and must be paid in addition to scheduled instalments. This penalty arrangement complies with the limits set by the Microlending Act, 2018.`;
    const penLines = doc.splitTextToSize(penText, pageW - margin*2);
    doc.text(penLines, margin, y); y += penLines.length * 4 + 4;
  }

  // ---- REPAYMENT SCHEDULE ----
  if (y > 240) { doc.addPage(); y = 20; }
  doc.setFontSize(11).setFont('helvetica', 'bold');
  doc.text('4. REPAYMENT SCHEDULE', margin, y); y += 5;
  doc.autoTable({
    startY: y,
    head: [['Inst. #', 'Due Date', 'Amount Due (N$)']],
    body: schedule.map(it => [it.instalmentNo, fmtDate(it.dueDate), it.amountDue.toLocaleString('en-US', { minimumFractionDigits: 2 })]),
    theme: 'striped',
    headStyles: { fillColor: [30, 64, 175], textColor: 255, fontStyle: 'bold', fontSize: 9 },
    bodyStyles: { fontSize: 9 },
    margin: { left: margin, right: margin }
  });
  y = doc.lastAutoTable.finalY + 6;

  // ---- TERMS AND CONDITIONS ----
  if (y > 220) { doc.addPage(); y = 20; }
  doc.setFontSize(11).setFont('helvetica', 'bold');
  doc.text('5. TERMS AND CONDITIONS', margin, y); y += 5;
  doc.setFontSize(9).setFont('helvetica', 'normal');

  const terms = [
    ['5.1 Cooling-Off Period', 'The Borrower may, within five (5) business days of signing this agreement, cancel the loan by repaying the principal in full without any interest or charges, in accordance with Section 13 of the Microlending Act, 2018.'],
    ['5.2 Repayment', 'The Borrower undertakes to repay each instalment on or before the due date stated in the schedule above, by the method agreed with the Lender (cash, bank transfer, mobile money, or cheque).'],
    ['5.3 Default', 'Should the Borrower fail to pay any instalment by its due date, the full outstanding balance may become immediately due and payable. The Lender reserves the right to institute legal action and to list the Borrower with credit bureaus, as permitted by law.'],
    ['5.4 Early Settlement', 'The Borrower may at any time settle the outstanding balance in full or in part without penalty. Upon settlement, only interest accrued up to the date of settlement shall be payable.'],
    ['5.5 Variation', 'Any variation of this agreement must be in writing and signed by both parties.'],
    ['5.6 Complaints', 'In the event of any dispute, the Borrower may lodge a complaint with the Namibia Financial Institutions Supervisory Authority (NAMFISA) at +264 61 290 5000 or complaints@namfisa.com.na.'],
    ['5.7 Personal Information', 'The Borrower consents to the processing of personal information by the Lender for the purposes of administering this loan, in accordance with applicable data protection laws.']
  ];
  for (const [heading, body] of terms) {
    if (y > 270) { doc.addPage(); y = 20; }
    doc.setFont('helvetica', 'bold').setFontSize(9);
    doc.text(heading, margin, y); y += 4;
    doc.setFont('helvetica', 'normal');
    const wrapped = doc.splitTextToSize(body, pageW - margin*2);
    doc.text(wrapped, margin, y); y += wrapped.length * 4 + 3;
  }

  // ---- ACKNOWLEDGMENT & SIGNATURES ----
  if (y > 220) { doc.addPage(); y = 20; }
  y += 6;
  doc.setFontSize(11).setFont('helvetica', 'bold');
  doc.text('6. ACKNOWLEDGMENT', margin, y); y += 5;
  doc.setFontSize(9).setFont('helvetica', 'normal');
  const ack = 'The Borrower acknowledges that the terms of this agreement, including the total cost of credit and the Annual Percentage Rate, have been explained and understood. The Borrower confirms that the information provided is true and correct, and that this loan is being taken voluntarily.';
  const ackLines = doc.splitTextToSize(ack, pageW - margin*2);
  doc.text(ackLines, margin, y); y += ackLines.length * 4 + 10;

  const sigY = y;
  const colW = (pageW - margin*2 - 20) / 2;
  doc.setDrawColor(0).setLineWidth(0.3);
  doc.line(margin, sigY + 12, margin + colW, sigY + 12);
  doc.line(margin + colW + 20, sigY + 12, margin + colW + 20 + colW, sigY + 12);
  doc.setFontSize(9);

  doc.text(`Borrower: ${client?.fullName || ''}`, margin, sigY + 22);
  doc.text('Signed at _____________________ on ___________', margin + colW + 20, sigY + 18);
  doc.text(`For and on behalf of the Lender`, margin + colW + 20, sigY + 22);

  // ---- FOOTER ----
  const pageCount = doc.internal.getNumberOfPages();
  for (let i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    doc.setFontSize(8).setTextColor(120);
    doc.text(`${loan.id}  ·  Page ${i} of ${pageCount}`, pageW/2, doc.internal.pageSize.getHeight() - 8, { align: 'center' });
  }

  return doc;
}

  const client = state.clients.find(c => c.id === loan.clientId);
  const safeName = (client?.fullName || 'client').replace(/[^A-Za-z0-9]/g, '_');
  const filename = `Loan_Agreement_${safeName}_${loan.id}.pdf`;
  const companyName = state.settings.companyName || 'Instant Cashloan';
  const opts = {
    subtitle: `For ${client?.fullName || ''} · ${loan.id}`
  };
  if (client?.phone) {
    opts.whatsapp = { phone: client.phone, message: buildAgreementMessage(loan, client, companyName), label: 'WhatsApp ' + client.fullName.split(' ')[0] };

  };
  if (client?.phone) {
    opts.whatsapp = { phone: client.phone, message: buildReceiptMessage(payment, client, companyName), label: 'WhatsApp ' + client.fullName.split(' ')[0] };
  }
  if (client?.email) {
    opts.email = {
      to: client.email,
      subject: `Payment Receipt from ${companyName}`,
      body: buildReceiptMessage(payment, client, companyName),
      label: 'Email ' + client.fullName.split(' ')[0]
    };
  }
  showPdfPreview(doc, filename, opts);
  logAudit('generate_pdf', 'payment', paymentId, { document: 'receipt' });
}

function buildReceiptMessage(payment, client, companyName) {
  const loan = state.loans.find(l => l.id === payment.loanId);
  const remaining = loan ? loanOutstanding(loan.id) : 0;
  let msg = `Hello ${client.fullName.split(' ')[0]},\n\nThank you for your payment to ${companyName}.\n\nReceipt: ${payment.receiptNumber || payment.id}\nAmount Received: ${fmt(payment.amount)}\nDate: ${fmtDate(payment.paymentDate)}\nLoan: ${payment.loanId}\n`;
  if (remaining > 0.01) msg += `Outstanding Balance: ${fmt(remaining)}\n`;
  else msg += `\n*Your loan is fully settled. Congratulations!*\n`;
  msg += `\nPlease find your official receipt PDF attached.\n\nThank you.`;
  return msg;
}

function shareReceiptWhatsApp(paymentId) {
  downloadReceipt(paymentId);
}

      ${escapeHtml(options.whatsapp.label || 'Send via WhatsApp')}

  const emailBtn = options.email ? `
    <button onclick="sendCurrentPdfEmail()" class="text-sm bg-slate-700 hover:bg-slate-800 text-white px-4 py-2 rounded-lg font-medium flex items-center gap-2">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>

function closePdfPreview() {
  const c = document.getElementById('pdf-preview-container');
  if (c) c.remove();
  if (state.currentPdf?.blobUrl) {
    try { URL.revokeObjectURL(state.currentPdf.blobUrl); } catch (e) {}
  }
  state.currentPdf = null;
}

function downloadCurrentPdf() {
  if (!state.currentPdf) return;
  const { dataUri, filename } = state.currentPdf;
  // Try multiple methods to maximize chance of success in sandboxed iframe
  // Method 1: anchor with download attribute
  try {
    const a = document.createElement('a');
    a.href = dataUri;
    a.download = filename;
    a.target = '_blank';
    a.rel = 'noopener';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  } catch (e) {
    // Method 2: open in new window via openLink (escapes the sandbox)
    if (typeof openLink === 'function') {
      openLink(dataUri);
    } else {
      window.open(dataUri, '_blank');
    }
  }
}

function sendCurrentPdfWhatsApp() {
  if (!state.currentPdf?.whatsapp) return;
  // Trigger download first so user has the file to attach
  downloadCurrentPdf();
  // Open WhatsApp shortly after
  const { phone, message } = state.currentPdf.whatsapp;
  setTimeout(() => openWhatsApp(phone, message), 400);
}

function generateReceipt(paymentId) {
  if (!window.jspdf) { showAlert('PDF library not loaded. Please wait a moment and try again.'); return; }
  const payment = state.payments.find(p => p.id === paymentId);
  if (!payment) return;
  const loan = state.loans.find(l => l.id === payment.loanId);
  const client = state.clients.find(c => c.id === payment.clientId);
  const s = state.settings || {};
  const remaining = loan ? loanOutstanding(loan.id) : 0;

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: 'mm', format: 'a5', orientation: 'portrait' });
  const pageW = doc.internal.pageSize.getWidth();
  const margin = 12;
  let y = 12;

  // Header
  doc.setFontSize(13).setFont('helvetica', 'bold');
  doc.text(s.companyName || 'Instant Cashloan', pageW/2, y, { align: 'center' }); y += 5;
  doc.setFontSize(8).setFont('helvetica', 'normal');
  if (s.namfisaReg) { doc.text(`NAMFISA Reg. No.: ${s.namfisaReg}`, pageW/2, y, { align: 'center' }); y += 3.5; }
  if (s.address) { doc.text(s.address, pageW/2, y, { align: 'center' }); y += 3.5; }
  if (s.phone) { doc.text(s.phone, pageW/2, y, { align: 'center' }); y += 3.5; }
  y += 2;
  doc.setDrawColor(30, 64, 175).setLineWidth(0.4).line(margin, y, pageW - margin, y); y += 6;

  // Title
  doc.setFontSize(12).setFont('helvetica', 'bold');
  doc.text('PAYMENT RECEIPT', pageW/2, y, { align: 'center' }); y += 8;

  // Receipt body
  doc.setFontSize(9).setFont('helvetica', 'normal');
  const row = (label, value, bold) => {
    doc.setFont('helvetica', 'normal').text(label, margin, y);
    doc.setFont('helvetica', bold ? 'bold' : 'normal').text(String(value), pageW - margin, y, { align: 'right' });
    y += 5;
  };
  row('Receipt No.', payment.receiptNumber || payment.id);
  row('Date', fmtDate(payment.paymentDate));
  row('Time Recorded', new Date(payment.createdAt || payment.paymentDate).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' }));
  y += 2;
  doc.setDrawColor(200).setLineWidth(0.2).line(margin, y, pageW - margin, y); y += 4;
  row('Received From', client?.fullName || '—', true);
  row('Phone', client?.phone || '—');
  row('Loan Reference', payment.loanId);
  row('Payment Method', payment.method);
  y += 2;
  doc.setDrawColor(200).line(margin, y, pageW - margin, y); y += 6;

  // Amount box
  doc.setFillColor(239, 246, 255);
  doc.rect(margin, y, pageW - margin*2, 16, 'F');
  doc.setFontSize(8).setTextColor(30, 64, 175).setFont('helvetica', 'normal');
  doc.text('AMOUNT RECEIVED', pageW/2, y + 5, { align: 'center' });
  doc.setFontSize(16).setFont('helvetica', 'bold');
  doc.text(fmt(payment.amount), pageW/2, y + 13, { align: 'center' });
  doc.setTextColor(0);
  y += 22;

  // Balance summary
  if (loan) {
    doc.setFontSize(9).setFont('helvetica', 'normal');
    row('Total Repayable', fmt(loan.totalRepayable));
    row('Total Paid To Date', fmt(loanPaid(loan.id)));
    row('Remaining Balance', fmt(remaining), true);
    y += 2;
    if (remaining <= 0.01) {
      doc.setFillColor(220, 252, 231);
      doc.rect(margin, y, pageW - margin*2, 8, 'F');
      doc.setTextColor(22, 101, 52).setFont('helvetica', 'bold').setFontSize(10);
      doc.text('LOAN FULLY SETTLED', pageW/2, y + 5.5, { align: 'center' });
      doc.setTextColor(0);
      y += 12;
    }
  }

  if (payment.notes) {
    y += 4;
    doc.setFontSize(8).setFont('helvetica', 'italic').setTextColor(80);
    doc.text('Notes: ' + payment.notes, margin, y, { maxWidth: pageW - margin*2 });
    doc.setTextColor(0);
    y += 8;
  }

  // Footer
  y = doc.internal.pageSize.getHeight() - 25;
  doc.setDrawColor(200).line(margin, y, pageW - margin, y); y += 4;
  doc.setFontSize(7).setFont('helvetica', 'normal').setTextColor(120);
  doc.text(`Recorded by: ${state.users.find(u => u.id === payment.createdBy)?.fullName || 'System'}`, margin, y); y += 3;
  doc.text('This is a computer-generated receipt. Retain for your records.', margin, y); y += 3;
  doc.text('Thank you for your payment.', pageW/2, y + 4, { align: 'center' });

  return doc;
}
